<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/layout :: head('Bảng Lương')}"></head>
<body>

<th:block th:replace="~{fragments/layout :: sidebar('payroll')}"></th:block>

<div class="main-wrapper">
  <th:block th:replace="~{fragments/layout :: topbar('Bảng Lương Nhân Viên')}"></th:block>

  <div class="main-content">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
      <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
      <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Bộ lọc + hành động -->
    <div class="card mb-3">
      <div class="card-body py-2">
        <form class="row align-items-center g-2" method="get" th:action="@{/payroll}">
          <div class="col-auto">
            <label class="form-label mb-0 fw-semibold">Tháng:</label>
          </div>
          <div class="col-auto">
            <select name="month" class="form-select form-select-sm" style="width:auto;">
              <option th:each="m : ${#numbers.sequence(1,12)}"
                      th:value="${m}"
                      th:text="${'Tháng ' + m}"
                      th:selected="${m == selectedMonth}"></option>
            </select>
          </div>
          <div class="col-auto">
            <label class="form-label mb-0 fw-semibold">Năm:</label>
          </div>
          <div class="col-auto">
            <select name="year" class="form-select form-select-sm" style="width:auto;">
              <option th:each="y : ${#numbers.sequence(2023,2026)}"
                      th:value="${y}"
                      th:text="${y}"
                      th:selected="${y == selectedYear}"></option>
            </select>
          </div>
          <div class="col-auto">
            <button type="submit" class="btn btn-sm btn-outline-primary">
              <i class="fas fa-search me-1"></i>Xem
            </button>
          </div>
          <div class="col-auto ms-auto d-flex gap-2">
            <a th:href="@{/payroll/new}" class="btn btn-sm btn-outline-secondary">
              <i class="fas fa-plus me-1"></i>Tạo Thủ Công
            </a>
            <!-- Generate from attendance -->
            <form method="post" th:action="@{/payroll/generate}" class="d-inline">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <input type="hidden" name="month" th:value="${selectedMonth}"/>
              <input type="hidden" name="year" th:value="${selectedYear}"/>
              <button type="submit" class="btn btn-sm btn-coffee"
                      onclick="return confirm('Tự động tạo bảng lương tháng này từ dữ liệu chấm công?')">
                <i class="fas fa-magic me-1"></i>Tạo Tự Động
              </button>
            </form>
            <!-- Approve all -->
            <form method="post" th:action="@{/payroll/approve-all}" class="d-inline"
                  th:if="${!payrolls.isEmpty()}">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <input type="hidden" name="month" th:value="${selectedMonth}"/>
              <input type="hidden" name="year" th:value="${selectedYear}"/>
              <button type="submit" class="btn btn-sm btn-outline-info"
                      onclick="return confirm('Duyệt tất cả phiếu lương đang chờ?')">
                <i class="fas fa-check-double me-1"></i>Duyệt Tất Cả
              </button>
            </form>
          </div>
        </form>
      </div>
    </div>

    <!-- Bảng lương -->
    <div class="card">
      <div class="card-header py-3 d-flex justify-content-between align-items-center">
        <span>
          <i class="fas fa-money-bill-wave me-2 text-success"></i>
          Lương Tháng <strong th:text="${selectedMonth}">-</strong>/<strong th:text="${selectedYear}">-</strong>
        </span>
        <span class="badge rounded-pill bg-success fs-6" th:if="${totalSalary != null}">
          Tổng: <span th:text="${#numbers.formatDecimal(totalSalary,1,'COMMA',0,'POINT') + ' ₫'}">-</span>
        </span>
      </div>
      <div class="card-body p-0">

        <div th:if="${payrolls.isEmpty()}" class="text-center py-5 text-muted">
          <i class="fas fa-file-invoice-dollar fa-3x mb-3 d-block"></i>
          Chưa có dữ liệu lương tháng này.
          <div class="mt-2">
            <form method="post" th:action="@{/payroll/generate}" class="d-inline">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <input type="hidden" name="month" th:value="${selectedMonth}"/>
              <input type="hidden" name="year" th:value="${selectedYear}"/>
              <button type="submit" class="btn btn-coffee mt-2">
                <i class="fas fa-magic me-1"></i>Tự Động Tạo Bảng Lương
              </button>
            </form>
          </div>
        </div>

        <div th:unless="${payrolls.isEmpty()}" class="table-responsive">
          <table class="table table-hover mb-0">
            <thead>
              <tr>
                <th class="ps-4">Nhân Viên</th>
                <th>Lương CB</th>
                <th>Ngày CĐ</th>
                <th>Ngày TT</th>
                <th>Phép</th>
                <th>OT (h)</th>
                <th>Phụ Cấp</th>
                <th>Khấu Trừ</th>
                <th class="fw-bold">Thực Nhận</th>
                <th>Trạng Thái</th>
                <th class="text-center">Thao Tác</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="p : ${payrolls}">
                <td class="ps-4">
                  <div class="fw-semibold" th:text="${p.employee.fullName}">-</div>
                  <div class="text-muted small" th:text="${p.employee.employeeCode}">-</div>
                </td>
                <td class="text-end" th:text="${#numbers.formatDecimal(p.baseSalary,1,'COMMA',0,'POINT')}">-</td>
                <td class="text-center" th:text="${p.standardWorkDays}">-</td>
                <td class="text-center fw-medium" th:text="${p.actualWorkDays}">-</td>
                <td class="text-center" th:text="${p.paidLeaveDays}">-</td>
                <td class="text-center" th:text="${p.overtimeHours}">-</td>
                <td class="text-end" th:text="${p.allowance != null ? #numbers.formatDecimal(p.allowance,1,'COMMA',0,'POINT') : 0}">-</td>
                <td class="text-end text-danger" th:text="${p.deduction != null ? #numbers.formatDecimal(p.deduction,1,'COMMA',0,'POINT') : 0}">-</td>
                <td class="text-end fw-bold text-success"
                    th:text="${p.netSalary != null ? #numbers.formatDecimal(p.netSalary,1,'COMMA',0,'POINT') + ' ₫' : '-'}">-</td>
                <td>
                  <span class="badge rounded-pill"
                        th:classappend="${p.status == 'PAID'} ? 'bg-success' : (${p.status == 'APPROVED'} ? 'bg-info' : 'bg-warning text-dark')"
                        th:text="${p.status == 'PAID'} ? 'Đã Thanh Toán' : (${p.status == 'APPROVED'} ? 'Đã Duyệt' : 'Chờ Duyệt')">-</span>
                </td>
                <td class="text-center">
                  <a th:href="@{/payroll/{id}/detail(id=${p.id})}"
                     class="btn btn-sm btn-outline-secondary me-1" title="Chi tiết">
                    <i class="fas fa-eye"></i>
                  </a>
                  <a th:href="@{/payroll/{id}/edit(id=${p.id})}"
                     class="btn btn-sm btn-outline-primary me-1" title="Sửa">
                    <i class="fas fa-edit"></i>
                  </a>
                  <!-- Approve -->
                  <form th:if="${p.status == 'PENDING'}" method="post"
                        th:action="@{/payroll/{id}/approve(id=${p.id})}" class="d-inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="month" th:value="${selectedMonth}"/>
                    <input type="hidden" name="year" th:value="${selectedYear}"/>
                    <button type="submit" class="btn btn-sm btn-outline-info me-1" title="Duyệt">
                      <i class="fas fa-check"></i>
                    </button>
                  </form>
                  <!-- Mark paid -->
                  <form th:if="${p.status == 'APPROVED'}" method="post"
                        th:action="@{/payroll/{id}/paid(id=${p.id})}" class="d-inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="month" th:value="${selectedMonth}"/>
                    <input type="hidden" name="year" th:value="${selectedYear}"/>
                    <button type="submit" class="btn btn-sm btn-outline-success me-1" title="Thanh toán">
                      <i class="fas fa-money-bill"></i>
                    </button>
                  </form>
                  <!-- Delete -->
                  <button class="btn btn-sm btn-outline-danger" title="Xóa"
                          data-bs-toggle="modal" data-bs-target="#deleteModal"
                          th:attr="data-id=${p.id}, data-name=${p.employee.fullName}"
                          onclick="setDeleteTarget(this)">
                    <i class="fas fa-trash"></i>
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Delete Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 rounded-4">
      <div class="modal-header border-0">
        <h5 class="modal-title text-danger"><i class="fas fa-trash me-2"></i>Xóa Phiếu Lương</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">Xóa phiếu lương của <strong id="deleteEmpName"></strong>?</div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Hủy</button>
        <form id="deleteForm" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <input type="hidden" name="month" th:id="deleteMonth" th:value="${selectedMonth}"/>
          <input type="hidden" name="year" th:id="deleteYear" th:value="${selectedYear}"/>
          <button type="submit" class="btn btn-danger">Xóa</button>
        </form>
      </div>
    </div>
  </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<script>
  function setDeleteTarget(btn) {
    document.getElementById('deleteEmpName').textContent = btn.dataset.name;
    document.getElementById('deleteForm').action = '/payroll/' + btn.dataset.id + '/delete';
  }
</script>
</body>
</html>
