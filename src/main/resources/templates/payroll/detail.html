<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/layout :: head('Chi Tiết Phiếu Lương')}"></head>
<body>

<th:block th:replace="~{fragments/layout :: sidebar('payroll')}"></th:block>

<div class="main-wrapper">
  <th:block th:replace="~{fragments/layout :: topbar('Chi Tiết Phiếu Lương')}"></th:block>

  <div class="main-content">
    <div class="row justify-content-center">
      <div class="col-lg-7">

        <!-- Header badge -->
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h5 class="mb-0 fw-bold">
            Phiếu Lương Tháng
            <span th:text="${payroll.month}">-</span>/<span th:text="${payroll.year}">-</span>
          </h5>
          <span class="badge rounded-pill fs-6"
                th:classappend="${payroll.status == 'PAID'} ? 'bg-success' : (${payroll.status == 'APPROVED'} ? 'bg-info' : 'bg-warning text-dark')"
                th:text="${payroll.status == 'PAID'} ? 'Đã Thanh Toán' : (${payroll.status == 'APPROVED'} ? 'Đã Duyệt' : 'Chờ Duyệt')">-</span>
        </div>

        <div class="card mb-3">
          <div class="card-header py-3">
            <i class="fas fa-user me-2 text-primary"></i>Thông Tin Nhân Viên
          </div>
          <div class="card-body">
            <div class="row g-2">
              <div class="col-6">
                <div class="text-muted small">Mã NV</div>
                <div class="fw-semibold" th:text="${payroll.employee.employeeCode}">-</div>
              </div>
              <div class="col-6">
                <div class="text-muted small">Họ Tên</div>
                <div class="fw-semibold" th:text="${payroll.employee.fullName}">-</div>
              </div>
              <div class="col-6">
                <div class="text-muted small">Chức Vụ</div>
                <div th:text="${payroll.employee.position}">-</div>
              </div>
              <div class="col-6">
                <div class="text-muted small">Bộ Phận</div>
                <div th:text="${payroll.employee.department}">-</div>
              </div>
            </div>
          </div>
        </div>

        <div class="card mb-3">
          <div class="card-header py-3">
            <i class="fas fa-calculator me-2 text-success"></i>Chi Tiết Tính Lương
          </div>
          <div class="card-body">
            <table class="table table-borderless mb-0">
              <tbody>
                <tr>
                  <td class="text-muted">Lương Cơ Bản</td>
                  <td class="fw-semibold text-end"
                      th:text="${#numbers.formatDecimal(payroll.baseSalary,1,'COMMA',0,'POINT') + ' ₫'}">-</td>
                </tr>
                <tr>
                  <td class="text-muted">Ngày Công Chuẩn</td>
                  <td class="text-end" th:text="${payroll.standardWorkDays + ' ngày'}">-</td>
                </tr>
                <tr>
                  <td class="text-muted">Ngày Công Thực Tế</td>
                  <td class="text-end fw-medium" th:text="${payroll.actualWorkDays + ' ngày'}">-</td>
                </tr>
                <tr>
                  <td class="text-muted">Ngày Phép Được Tính Lương</td>
                  <td class="text-end" th:text="${payroll.paidLeaveDays + ' ngày'}">-</td>
                </tr>
                <tr>
                  <td class="text-muted">Giờ Tăng Ca</td>
                  <td class="text-end" th:text="${payroll.overtimeHours + 'h (×' + payroll.overtimeRate + ')'}">-</td>
                </tr>
                <tr class="border-top">
                  <td class="text-muted">Phụ Cấp</td>
                  <td class="text-end text-success"
                      th:text="${payroll.allowance != null ? '+' + #numbers.formatDecimal(payroll.allowance,1,'COMMA',0,'POINT') + ' ₫' : '0 ₫'}">-</td>
                </tr>
                <tr>
                  <td class="text-muted">Khấu Trừ</td>
                  <td class="text-end text-danger"
                      th:text="${payroll.deduction != null ? '-' + #numbers.formatDecimal(payroll.deduction,1,'COMMA',0,'POINT') + ' ₫' : '0 ₫'}">-</td>
                </tr>
                <tr class="border-top table-success">
                  <td class="fw-bold fs-5">Thực Nhận</td>
                  <td class="fw-bold fs-5 text-end text-success"
                      th:text="${payroll.netSalary != null ? #numbers.formatDecimal(payroll.netSalary,1,'COMMA',0,'POINT') + ' ₫' : '—'}">-</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div th:if="${payroll.note}" class="card mb-3">
          <div class="card-header py-3">
            <i class="fas fa-sticky-note me-2 text-warning"></i>Ghi Chú
          </div>
          <div class="card-body" th:text="${payroll.note}">-</div>
        </div>

        <div th:if="${payroll.paidDate}" class="text-muted small text-end mb-3">
          Thanh toán lúc: <span th:text="${#temporals.format(payroll.paidDate,'dd/MM/yyyy HH:mm')}">-</span>
        </div>

        <div class="d-flex gap-2">
          <a th:href="@{/payroll/{id}/edit(id=${payroll.id})}" class="btn btn-coffee">
            <i class="fas fa-edit me-1"></i>Chỉnh Sửa
          </a>
          <a th:href="@{/payroll(month=${payroll.month},year=${payroll.year})}"
             class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left me-1"></i>Quay Lại
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
