<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/layout :: head('Phiếu Lương')}"></head>
<body>

<th:block th:replace="~{fragments/layout :: sidebar('payroll')}"></th:block>

<div class="main-wrapper">
  <th:block th:replace="~{fragments/layout :: topbar('Phiếu Lương Nhân Viên')}"></th:block>

  <div class="main-content">
    <div class="row justify-content-center">
      <div class="col-lg-8">

        <div class="card">
          <div class="card-header py-3">
            <i class="fas fa-file-invoice-dollar me-2 text-success"></i>
            <span th:text="${payroll.id != null} ? 'Chỉnh Sửa Phiếu Lương' : 'Tạo Phiếu Lương'">Phiếu Lương</span>
            <span th:if="${payroll.employee != null}" class="ms-2 fw-bold"
                  th:text="'— ' + ${payroll.employee.fullName}">-</span>
          </div>
          <div class="card-body">
            <form th:action="${payroll.id != null} ? @{/payroll/{id}/edit(id=${payroll.id})} : @{/payroll/new}"
                  th:object="${payroll}" method="post" id="payrollForm">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

              <!-- Chọn nhân viên (chỉ hiện khi tạo mới) -->
              <div class="mb-3" th:if="${payroll.id == null}">
                <label class="form-label fw-semibold">Nhân Viên <span class="text-danger">*</span></label>
                <select name="employeeId" class="form-select" required>
                  <option value="">-- Chọn nhân viên --</option>
                  <option th:each="emp : ${employees}"
                          th:value="${emp.id}"
                          th:text="${emp.employeeCode + ' - ' + emp.fullName}">
                  </option>
                </select>
              </div>

              <div class="row g-3 mb-3">
                <div class="col-md-4">
                  <label class="form-label fw-semibold">Tháng <span class="text-danger">*</span></label>
                  <select th:field="*{month}" class="form-select" required>
                    <option th:each="m : ${#numbers.sequence(1,12)}"
                            th:value="${m}" th:text="${'Tháng ' + m}"></option>
                  </select>
                </div>
                <div class="col-md-4">
                  <label class="form-label fw-semibold">Năm <span class="text-danger">*</span></label>
                  <select th:field="*{year}" class="form-select" required>
                    <option th:each="y : ${#numbers.sequence(2023,2026)}"
                            th:value="${y}" th:text="${y}"></option>
                  </select>
                </div>
              </div>

              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Lương Cơ Bản (₫)</label>
                  <input type="number" th:field="*{baseSalary}" class="form-control calc-field"
                         step="1000" min="0" placeholder="0"/>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Ngày Công Chuẩn</label>
                  <input type="number" th:field="*{standardWorkDays}" class="form-control calc-field"
                         min="1" max="31" placeholder="26"/>
                </div>
              </div>

              <div class="row g-3 mb-3">
                <div class="col-md-4">
                  <label class="form-label fw-semibold">Ngày Công Thực Tế</label>
                  <input type="number" th:field="*{actualWorkDays}" class="form-control calc-field"
                         min="0" placeholder="0"/>
                </div>
                <div class="col-md-4">
                  <label class="form-label fw-semibold">Ngày Phép Được Tính Lương</label>
                  <input type="number" th:field="*{paidLeaveDays}" class="form-control calc-field"
                         min="0" placeholder="0"/>
                </div>
                <div class="col-md-4">
                  <label class="form-label fw-semibold">Giờ Tăng Ca</label>
                  <input type="number" th:field="*{overtimeHours}" class="form-control calc-field"
                         step="0.5" min="0" placeholder="0"/>
                </div>
              </div>

              <div class="row g-3 mb-3">
                <div class="col-md-4">
                  <label class="form-label fw-semibold">Hệ Số OT</label>
                  <input type="number" th:field="*{overtimeRate}" class="form-control calc-field"
                         step="0.1" min="1" placeholder="1.5"/>
                </div>
                <div class="col-md-4">
                  <label class="form-label fw-semibold">Phụ Cấp (₫)</label>
                  <input type="number" th:field="*{allowance}" class="form-control calc-field"
                         step="1000" min="0" placeholder="0"/>
                </div>
                <div class="col-md-4">
                  <label class="form-label fw-semibold">Khấu Trừ (₫)</label>
                  <input type="number" th:field="*{deduction}" class="form-control calc-field"
                         step="1000" min="0" placeholder="0"/>
                </div>
              </div>

              <!-- Preview net salary -->
              <div class="alert alert-success mb-3 d-flex justify-content-between align-items-center">
                <span><i class="fas fa-calculator me-2"></i><strong>Lương Thực Nhận (dự tính):</strong></span>
                <span class="fs-5 fw-bold" id="netSalaryPreview">0 ₫</span>
              </div>

              <div class="mb-4">
                <label class="form-label fw-semibold">Ghi Chú</label>
                <textarea th:field="*{note}" class="form-control" rows="2"
                          placeholder="Ghi chú (nếu có)..."></textarea>
              </div>

              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-coffee flex-fill">
                  <i class="fas fa-save me-1"></i>Lưu Phiếu Lương
                </button>
                <a th:href="@{/payroll}" class="btn btn-outline-secondary">
                  <i class="fas fa-arrow-left me-1"></i>Quay Lại
                </a>
              </div>
            </form>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<script>
  const calcFields = document.querySelectorAll('.calc-field');
  function recalc() {
    const base = parseFloat(document.getElementById('baseSalary').value) || 0;
    const std  = parseFloat(document.getElementById('standardWorkDays').value) || 26;
    const act  = parseFloat(document.getElementById('actualWorkDays').value) || 0;
    const leave= parseFloat(document.getElementById('paidLeaveDays').value) || 0;
    const ot   = parseFloat(document.getElementById('overtimeHours').value) || 0;
    const rate = parseFloat(document.getElementById('overtimeRate').value) || 1.5;
    const allow= parseFloat(document.getElementById('allowance').value) || 0;
    const ded  = parseFloat(document.getElementById('deduction').value) || 0;

    const dailyRate = std > 0 ? base / std : 0;
    const otRate = std > 0 && base > 0 ? (base / std / 8) * rate : 0;
    const net = dailyRate * (act + leave) + otRate * ot + allow - ded;

    document.getElementById('netSalaryPreview').textContent =
        Math.max(0, Math.round(net)).toLocaleString('vi-VN') + ' ₫';
  }
  calcFields.forEach(f => f.addEventListener('input', recalc));
  recalc();
</script>
</body>
</html>
