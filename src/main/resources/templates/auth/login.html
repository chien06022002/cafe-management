<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đăng Nhập | Café Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <style>
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .login-card {
      background: #fff; border-radius: 20px; padding: 48px 42px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4); width: 100%; max-width: 420px;
    }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo .icon { font-size: 3rem; color: #6f4e37; }
    .login-logo h1 { font-size: 1.5rem; font-weight: 700; color: #1a1a2e; margin: 8px 0 4px; }
    .login-logo p { color: #888; font-size: .88rem; }
    .form-label { font-weight: 600; font-size: .875rem; color: #555; }
    .form-control { border-radius: 10px; padding: 11px 14px; border: 1.5px solid #e0e0e0; }
    .form-control:focus { border-color: #6f4e37; box-shadow: 0 0 0 3px rgba(111,78,55,.15); }
    .input-group-text { border-radius: 10px 0 0 10px; background: #f8f8f8; border: 1.5px solid #e0e0e0; color: #888; }
    .btn-login {
      background: linear-gradient(135deg, #6f4e37, #8b5e3c); color: #fff;
      border: none; border-radius: 10px; padding: 12px; font-weight: 600;
      font-size: 1rem; width: 100%; transition: all .2s;
    }
    .btn-login:hover { background: linear-gradient(135deg, #5d3d28, #6f4e37); transform: translateY(-1px); }
    .alert { border-radius: 10px; font-size: .875rem; }
    .divider { text-align: center; color: #aaa; font-size: .8rem; margin: 16px 0; position: relative; }
    .divider::before, .divider::after {
      content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: #e0e0e0;
    }
    .divider::before { left: 0; } .divider::after { right: 0; }
    .credentials-info { background: #fdf8f4; border: 1px dashed #d4a574; border-radius: 10px; padding: 12px 16px; font-size: .8rem; color: #6f4e37; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <div class="icon"><i class="fas fa-mug-hot"></i></div>
    <h1>Café Manager</h1>
    <p>Hệ thống quản lý quán cà phê</p>
  </div>

  <div th:if="${param.error}" class="alert alert-danger py-2">
    <i class="fas fa-exclamation-circle me-2"></i>Tên đăng nhập hoặc mật khẩu không đúng.
  </div>
  <div th:if="${param.logout}" class="alert alert-success py-2">
    <i class="fas fa-check-circle me-2"></i>Đăng xuất thành công!
  </div>

  <form th:action="@{/login}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <div class="mb-3">
      <label class="form-label">Tên đăng nhập</label>
      <div class="input-group">
        <span class="input-group-text"><i class="fas fa-user"></i></span>
        <input type="text" name="username" class="form-control" placeholder="Nhập tên đăng nhập" required autofocus/>
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label">Mật khẩu</label>
      <div class="input-group">
        <span class="input-group-text"><i class="fas fa-lock"></i></span>
        <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu" required/>
      </div>
    </div>

    <button type="submit" class="btn-login">
      <i class="fas fa-sign-in-alt me-2"></i>Đăng Nhập
    </button>
  </form>

  <div class="divider mt-4">Tài khoản mặc định</div>
  <div class="credentials-info">
    <div><strong>admin</strong> / admin123 &nbsp;·&nbsp; <i class="fas fa-crown"></i> Quản trị</div>
    <div><strong>manager</strong> / manager123 &nbsp;·&nbsp; <i class="fas fa-user-tie"></i> Quản lý</div>
    <div><strong>staff01</strong> / staff123 &nbsp;·&nbsp; <i class="fas fa-user"></i> Nhân viên</div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
