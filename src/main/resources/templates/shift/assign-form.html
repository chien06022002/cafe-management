<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/layout :: head('Phân Ca Nhân Viên')}"></head>
<body>

<th:block th:replace="~{fragments/layout :: sidebar('schedule')}"></th:block>

<div class="main-wrapper">
  <th:block th:replace="~{fragments/layout :: topbar('Phân Ca Nhân Viên')}"></th:block>

  <div class="main-content">
    <div class="row justify-content-center">
      <div class="col-lg-6">

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
          <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card">
          <div class="card-header py-3">
            <i th:class="${isEdit} ? 'fas fa-edit me-2 text-primary' : 'fas fa-plus-circle me-2 text-success'"></i>
            <span th:text="${isEdit} ? 'Cập Nhật Phân Ca' : 'Thêm Phân Ca'">Phân Ca</span>
          </div>
          <div class="card-body">
            <form th:action="${isEdit} ? @{/shifts/assign/{id}/edit(id=${assignment.id})} : @{/shifts/assign}"
                  th:object="${assignment}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

              <div class="mb-3">
                <label class="form-label fw-semibold">Nhân Viên <span class="text-danger">*</span></label>
                <select name="employeeId" class="form-select" required>
                  <option value="">-- Chọn nhân viên --</option>
                  <option th:each="emp : ${employees}"
                          th:value="${emp.id}"
                          th:text="${emp.employeeCode + ' - ' + emp.fullName}"
                          th:selected="${isEdit and assignment.employee != null and assignment.employee.id == emp.id}">
                  </option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">Ca Làm Việc <span class="text-danger">*</span></label>
                <select name="shiftId" class="form-select" required>
                  <option value="">-- Chọn ca --</option>
                  <option th:each="shift : ${shifts}"
                          th:value="${shift.id}"
                          th:text="${shift.name + ' (' + #temporals.format(shift.startTime,'HH:mm') + '-' + #temporals.format(shift.endTime,'HH:mm') + ')'}"
                          th:selected="${isEdit and assignment.shift != null and assignment.shift.id == shift.id}">
                  </option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">Ngày Làm <span class="text-danger">*</span></label>
                <input type="date" th:field="*{date}" class="form-control" required/>
              </div>

              <div class="mb-4">
                <label class="form-label fw-semibold">Ghi Chú</label>
                <input type="text" th:field="*{note}" class="form-control" placeholder="Ghi chú (nếu có)..."/>
              </div>

              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-coffee flex-fill">
                  <i class="fas fa-save me-1"></i>
                  <span th:text="${isEdit} ? 'Lưu Thay Đổi' : 'Phân Ca'"></span>
                </button>
                <a th:href="@{/shifts}" class="btn btn-outline-secondary">
                  <i class="fas fa-arrow-left me-1"></i>Quay Lại
                </a>
              </div>
            </form>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
