<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/layout :: head('Quản Lý Ca Làm')}"></head>
<body>

<th:block th:replace="~{fragments/layout :: sidebar('shifts-manage')}"></th:block>

<div class="main-wrapper">
  <th:block th:replace="~{fragments/layout :: topbar('Quản Lý Ca Làm Việc')}"></th:block>

  <div class="main-content">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
      <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
      <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-3">
      <!-- Form thêm / sửa ca -->
      <div class="col-lg-4">
        <div class="card">
          <div class="card-header py-3">
            <i th:class="${isEditShift} ? 'fas fa-edit me-2 text-primary' : 'fas fa-plus-circle me-2 text-success'"></i>
            <span th:text="${isEditShift} ? 'Cập Nhật Ca' : 'Thêm Ca Mới'">Thêm Ca</span>
          </div>
          <div class="card-body">
            <form th:action="${isEditShift} ? @{/shifts/manage/{id}/edit(id=${formShift.id})} : @{/shifts/manage/new}"
                  th:object="${formShift}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

              <div class="mb-3">
                <label class="form-label fw-semibold">Tên Ca <span class="text-danger">*</span></label>
                <input type="text" th:field="*{name}" class="form-control"
                       placeholder="VD: Ca Sáng, Ca Chiều..." required/>
              </div>
              <div class="row g-2 mb-3">
                <div class="col-6">
                  <label class="form-label fw-semibold">Giờ Bắt Đầu <span class="text-danger">*</span></label>
                  <input type="time" th:field="*{startTime}" class="form-control" required/>
                </div>
                <div class="col-6">
                  <label class="form-label fw-semibold">Giờ Kết Thúc <span class="text-danger">*</span></label>
                  <input type="time" th:field="*{endTime}" class="form-control" required/>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Mô Tả</label>
                <textarea th:field="*{description}" class="form-control" rows="2"
                          placeholder="Ghi chú về ca..."></textarea>
              </div>
              <div class="mb-3 form-check form-switch">
                <input class="form-check-input" type="checkbox" th:field="*{active}" role="switch"/>
                <label class="form-check-label fw-semibold">Đang hoạt động</label>
              </div>

              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-coffee flex-fill">
                  <i class="fas fa-save me-1"></i>
                  <span th:text="${isEditShift} ? 'Lưu Thay Đổi' : 'Thêm Ca'"></span>
                </button>
                <a th:if="${isEditShift}" th:href="@{/shifts/manage}" class="btn btn-outline-secondary">
                  <i class="fas fa-times"></i>
                </a>
              </div>
            </form>
          </div>
        </div>
      </div>

      <!-- Danh sách ca -->
      <div class="col-lg-8">
        <div class="card">
          <div class="card-header py-3 d-flex justify-content-between align-items-center">
            <span><i class="fas fa-clock me-2 text-primary"></i>Danh Sách Ca Làm Việc</span>
            <a th:href="@{/shifts}" class="btn btn-sm btn-outline-primary">
              <i class="fas fa-calendar-week me-1"></i>Xem Lịch Phân Ca
            </a>
          </div>
          <div class="card-body p-0">
            <div th:if="${shifts.isEmpty()}" class="text-center py-5 text-muted">
              <i class="fas fa-clock fa-3x mb-3 d-block"></i>Chưa có ca nào
            </div>
            <div th:unless="${shifts.isEmpty()}" class="table-responsive">
              <table class="table table-hover mb-0">
                <thead>
                  <tr>
                    <th class="ps-4">Tên Ca</th>
                    <th>Giờ Bắt Đầu</th>
                    <th>Giờ Kết Thúc</th>
                    <th>Số Giờ</th>
                    <th>Mô Tả</th>
                    <th>Trạng Thái</th>
                    <th class="text-center">Thao Tác</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="shift : ${shifts}">
                    <td class="ps-4 fw-semibold" th:text="${shift.name}">-</td>
                    <td th:text="${#temporals.format(shift.startTime,'HH:mm')}">-</td>
                    <td th:text="${#temporals.format(shift.endTime,'HH:mm')}">-</td>
                    <td>
                      <span class="badge bg-light text-dark border"
                            th:text="${shift.workHours + ' giờ'}">-</span>
                    </td>
                    <td class="text-muted small" th:text="${shift.description}">-</td>
                    <td>
                      <span class="badge rounded-pill"
                            th:classappend="${shift.active} ? 'bg-success' : 'bg-secondary'"
                            th:text="${shift.active} ? 'Hoạt động' : 'Tạm dừng'">-</span>
                    </td>
                    <td class="text-center">
                      <a th:href="@{/shifts/manage/{id}/edit(id=${shift.id})}"
                         class="btn btn-sm btn-outline-primary me-1">
                        <i class="fas fa-edit"></i>
                      </a>
                      <button class="btn btn-sm btn-outline-danger"
                              data-bs-toggle="modal" data-bs-target="#deleteModal"
                              th:attr="data-id=${shift.id}, data-name=${shift.name}"
                              onclick="setDeleteTarget(this)">
                        <i class="fas fa-trash"></i>
                      </button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Delete Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 rounded-4">
      <div class="modal-header border-0">
        <h5 class="modal-title text-danger"><i class="fas fa-trash me-2"></i>Xóa Ca Làm Việc</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">Xóa ca <strong id="deleteShiftName"></strong>?</div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Hủy</button>
        <form id="deleteForm" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" class="btn btn-danger">Xóa</button>
        </form>
      </div>
    </div>
  </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<script>
  function setDeleteTarget(btn) {
    document.getElementById('deleteShiftName').textContent = btn.dataset.name;
    document.getElementById('deleteForm').action = '/shifts/manage/' + btn.dataset.id + '/delete';
  }
</script>
</body>
</html>
