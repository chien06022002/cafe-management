<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/layout :: head('Lịch Phân Ca')}"></head>
<body>

<th:block th:replace="~{fragments/layout :: sidebar('schedule')}"></th:block>

<div class="main-wrapper">
  <th:block th:replace="~{fragments/layout :: topbar('Lịch Phân Ca Tuần')}"></th:block>

  <div class="main-content">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
      <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
      <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- ── Toolbar ── -->
    <div class="sched-toolbar mb-4">
      <div class="d-flex align-items-center gap-2 flex-wrap">
        <a th:href="@{/shifts(weekStart=${prevWeek})}" class="sched-nav-btn">
          <i class="fas fa-chevron-left"></i>
        </a>
        <div class="sched-week-label">
          <i class="fas fa-calendar-week me-2 text-muted"></i>
          <span th:text="${#temporals.format(weekStart,'dd/MM/yyyy')}">-</span>
          <span class="mx-2 text-muted">—</span>
          <span th:text="${#temporals.format(weekEnd,'dd/MM/yyyy')}">-</span>
        </div>
        <a th:href="@{/shifts(weekStart=${nextWeek})}" class="sched-nav-btn">
          <i class="fas fa-chevron-right"></i>
        </a>
        <a th:href="@{/shifts}" class="sched-today-btn">
          <i class="fas fa-crosshairs me-1"></i>Tuần Này
        </a>
      </div>
      <div class="d-flex gap-2">
        <a th:href="@{/shifts/manage}" class="btn btn-sm btn-outline-secondary">
          <i class="fas fa-cog me-1"></i>Quản Lý Ca
        </a>
        <a th:href="@{/shifts/assign}" class="btn btn-sm btn-coffee">
          <i class="fas fa-plus me-1"></i>Phân Ca
        </a>
      </div>
    </div>

    <!-- ── Schedule Grid ── -->
    <div class="sched-card">
      <div class="sched-scroll">
        <table class="sched-table">
          <thead>
            <tr>
              <th class="sched-hdr-shift">
                <div class="sched-hdr-shift-inner">
                  <i class="fas fa-layer-group me-1" style="opacity:.5;"></i> CA LÀM VIỆC
                </div>
              </th>
              <th th:each="day : ${weekDays}"
                  th:classappend="${day.equals(today)} ? ' sched-hdr-today' : ''"
                  class="sched-hdr-day">
                <div class="sched-hdr-dow"
                     th:text="${day.dayOfWeek.value == 7 ? 'CN' : 'T' + (day.dayOfWeek.value + 1)}">T2</div>
                <div class="sched-hdr-date" th:text="${#temporals.format(day,'dd/MM/yyyy')}">-</div>
                <div th:if="${day.equals(today)}" class="sched-today-dot"></div>
              </th>
            </tr>
          </thead>
          <tbody>

            <!-- Empty state -->
            <tr th:if="${weekShifts.isEmpty()}">
              <td colspan="8" class="sched-empty">
                <div class="sched-empty-icon"><i class="fas fa-calendar-times"></i></div>
                <div class="sched-empty-title">Chưa có lịch phân ca tuần này</div>
                <div class="sched-empty-sub">Hãy bắt đầu bằng cách phân ca cho nhân viên</div>
                <a th:href="@{/shifts/assign}" class="btn btn-sm btn-coffee mt-3">
                  <i class="fas fa-plus me-1"></i>Phân Ca Ngay
                </a>
              </td>
            </tr>

            <!-- Shift rows -->
            <tr th:each="shift, si : ${weekShifts}" class="sched-shift-row"
                th:classappend="${si.index % 2 == 1} ? ' sched-row-alt' : ''">

              <!-- Shift label -->
              <td class="sched-cell-shift">
                <div class="sched-shift-badge"
                     th:classappend="${si.index % 4 == 0} ? ' sb-orange' : (${si.index % 4 == 1} ? ' sb-teal' : (${si.index % 4 == 2} ? ' sb-violet' : ' sb-emerald'))">
                  <div class="sb-dot"></div>
                  <div>
                    <div class="sb-name" th:text="${shift.name}">Ca</div>
                    <div class="sb-time"
                         th:text="${#temporals.format(shift.startTime,'HH:mm') + ' – ' + #temporals.format(shift.endTime,'HH:mm')}">-</div>
                  </div>
                </div>
              </td>

              <!-- Day cells -->
              <td th:each="day : ${weekDays}"
                  th:classappend="${day.equals(today)} ? ' sched-cell-today' : ''"
                  class="sched-cell-day">
                <th:block th:each="a : ${assignments}"
                          th:if="${a.shift.id == shift.id && a.date.equals(day)}"
                          th:with="parts=${a.employee.fullName.split(' ')},
                                   lastName=${#strings.toUpperCase(parts[parts.length - 1])},
                                   initial=${#strings.toUpperCase(#strings.substring(a.employee.fullName,0,1))},
                                   ci=${a.employee.id % 5}">
                  <div class="emp-chip"
                       th:classappend="${ci == 0} ? ' chip-orange' :
                                       (${ci == 1} ? ' chip-teal' :
                                       (${ci == 2} ? ' chip-blue' :
                                       (${ci == 3} ? ' chip-violet' : ' chip-rose')))"
                       th:title="${a.employee.fullName + '\n' + a.employee.position + '\n' + shift.name + ' ' + #temporals.format(shift.startTime,'HH:mm') + '–' + #temporals.format(shift.endTime,'HH:mm')}">
                    <div class="chip-avatar" th:text="${initial}">A</div>
                    <span class="chip-name" th:text="${lastName}">NV</span>
                    <div class="chip-menu">
                      <a th:href="@{/shifts/assign/{id}/edit(id=${a.id})}" class="chip-action chip-action-edit">
                        <i class="fas fa-pen"></i>
                      </a>
                      <button type="button" class="chip-action chip-action-del"
                              th:attr="data-id=${a.id}" onclick="confirmDelete(this)">
                        <i class="fas fa-times"></i>
                      </button>
                    </div>
                  </div>
                </th:block>
              </td>

            </tr>
          </tbody>
        </table>
      </div>

      <!-- Legend -->
      <div class="sched-legend">
        <span class="legend-dot legend-orange"></span><span>Ca sáng</span>
        <span class="legend-dot legend-teal ms-3"></span><span>Ca chiều</span>
        <span class="legend-dot legend-blue ms-3"></span><span>Ca tối</span>
        <span class="legend-dot legend-today ms-3"></span><span>Hôm nay</span>
      </div>
    </div>

  </div>
</div>

<!-- Delete Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content border-0 rounded-4 shadow-lg">
      <div class="modal-header border-0 pb-1">
        <h6 class="modal-title text-danger fw-bold"><i class="fas fa-trash-alt me-2"></i>Xóa Phân Ca</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-muted" style="font-size:.92rem;">Bạn có chắc muốn xóa phân ca này?</div>
      <div class="modal-footer border-0 pt-0">
        <button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">Hủy</button>
        <form id="deleteForm" method="post" class="d-inline">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" class="btn btn-sm btn-danger"><i class="fas fa-trash me-1"></i>Xóa</button>
        </form>
      </div>
    </div>
  </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

<style>
/* ──────────────────────────────────────────────
   TOOLBAR
────────────────────────────────────────────── */
.sched-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  background: #fff;
  border-radius: 14px;
  padding: 12px 18px;
  box-shadow: 0 2px 12px rgba(0,0,0,.06);
}
.sched-nav-btn {
  width: 34px; height: 34px;
  border-radius: 10px;
  border: 1.5px solid #e2e8f0;
  background: #fff;
  color: #4a5568;
  display: flex; align-items: center; justify-content: center;
  font-size: .8rem;
  text-decoration: none;
  transition: all .2s;
}
.sched-nav-btn:hover { background: #6f4e37; color: #fff; border-color: #6f4e37; }
.sched-week-label {
  font-weight: 600;
  font-size: .93rem;
  color: #2d3748;
  padding: 0 6px;
}
.sched-today-btn {
  height: 34px;
  padding: 0 14px;
  border-radius: 10px;
  border: 1.5px solid #e2e8f0;
  background: #fff;
  color: #4a5568;
  font-size: .82rem;
  font-weight: 600;
  display: flex; align-items: center;
  text-decoration: none;
  transition: all .2s;
}
.sched-today-btn:hover { background: #6f4e37; color: #fff; border-color: #6f4e37; }

/* ──────────────────────────────────────────────
   CARD WRAPPER
────────────────────────────────────────────── */
.sched-card {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,.07);
  overflow: hidden;
}
.sched-scroll { overflow-x: auto; }

/* ──────────────────────────────────────────────
   TABLE
────────────────────────────────────────────── */
.sched-table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
  min-width: 860px;
}
.sched-table th, .sched-table td {
  border: 1px solid #f0f4f8;
}

/* ── Header ── */
.sched-hdr-shift {
  width: 160px;
  min-width: 160px;
  background: linear-gradient(135deg, #1a1a2e 0%, #2d2d4a 100%);
  padding: 16px 18px;
  color: rgba(255,255,255,.5);
  font-size: .7rem;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  vertical-align: middle;
  position: sticky;
  left: 0;
  z-index: 3;
}
.sched-hdr-shift-inner { display: flex; align-items: center; }
.sched-hdr-day {
  text-align: center;
  padding: 14px 10px 10px;
  background: linear-gradient(135deg, #1a1a2e 0%, #2d2d4a 100%);
  min-width: 130px;
  vertical-align: top;
}
.sched-hdr-day.sched-hdr-today {
  background: linear-gradient(135deg, #6f4e37 0%, #8b5e3c 100%);
}
.sched-hdr-dow {
  font-size: .8rem;
  font-weight: 800;
  color: rgba(255,255,255,.9);
  letter-spacing: .5px;
}
.sched-hdr-date {
  font-size: .72rem;
  color: rgba(255,255,255,.5);
  margin-top: 3px;
}
.sched-today-dot {
  width: 6px; height: 6px;
  background: #FFD166;
  border-radius: 50%;
  margin: 5px auto 0;
}

/* ── Shift rows ── */
.sched-shift-row { transition: background .15s; }
.sched-shift-row:hover td { background: #fafbff !important; }
.sched-row-alt td { background: #fafcff; }
.sched-cell-shift {
  width: 160px;
  min-width: 160px;
  padding: 14px 14px;
  background: #f7f9fc;
  vertical-align: middle;
  position: sticky;
  left: 0;
  z-index: 2;
  border-right: 2px solid #eaeff6;
}
.sched-cell-day {
  padding: 10px 8px;
  vertical-align: top;
  min-height: 64px;
}
.sched-cell-today {
  background: rgba(255, 209, 102, .08) !important;
  border-top: 2px solid rgba(255,150,50,.25) !important;
}

/* ── Shift badge ── */
.sched-shift-badge {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 10px;
  border-left: 4px solid transparent;
}
.sb-orange { background: rgba(255,140,66,.1); border-left-color: #FF8C42; }
.sb-teal   { background: rgba(23,177,193,.1); border-left-color: #17B1C1; }
.sb-violet { background: rgba(126,87,194,.1); border-left-color: #7E57C2; }
.sb-emerald{ background: rgba(38,166,91,.1);  border-left-color: #26A65B; }
.sb-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.sb-orange .sb-dot { background: #FF8C42; }
.sb-teal   .sb-dot { background: #17B1C1; }
.sb-violet .sb-dot { background: #7E57C2; }
.sb-emerald .sb-dot{ background: #26A65B; }
.sb-name {
  font-weight: 700;
  font-size: .84rem;
  color: #2d3748;
  line-height: 1.2;
}
.sb-time {
  font-size: .72rem;
  color: #8a94a6;
  margin-top: 2px;
}

/* ──────────────────────────────────────────────
   EMPLOYEE CHIP
────────────────────────────────────────────── */
.emp-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border-radius: 24px;
  padding: 5px 8px 5px 4px;
  margin: 3px 2px;
  font-size: .78rem;
  font-weight: 700;
  color: #fff;
  cursor: default;
  transition: transform .15s, box-shadow .15s;
  position: relative;
  box-shadow: 0 2px 6px rgba(0,0,0,.15);
}
.emp-chip:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 14px rgba(0,0,0,.2);
}
.emp-chip:hover .chip-menu { opacity: 1; pointer-events: auto; }

.chip-orange { background: linear-gradient(135deg, #FF8C42, #FF6B2B); }
.chip-teal   { background: linear-gradient(135deg, #17B1C1, #0D95A8); }
.chip-blue   { background: linear-gradient(135deg, #4E7EFF, #3060F0); }
.chip-violet { background: linear-gradient(135deg, #7E57C2, #5C3FA8); }
.chip-rose   { background: linear-gradient(135deg, #E84393, #C2185B); }

.chip-avatar {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: rgba(255,255,255,.25);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  font-size: .77rem;
  font-weight: 900;
  flex-shrink: 0;
  border: 1.5px solid rgba(255,255,255,.35);
}
.chip-name {
  letter-spacing: .4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 76px;
  text-shadow: 0 1px 2px rgba(0,0,0,.18);
}

/* Chip hover actions */
.chip-menu {
  display: inline-flex;
  gap: 3px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .15s;
  margin-left: 1px;
}
.chip-action {
  background: rgba(255,255,255,.22);
  border: none;
  border-radius: 50%;
  width: 20px; height: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: .62rem;
  color: #fff;
  cursor: pointer;
  padding: 0;
  text-decoration: none;
  transition: background .15s;
}
.chip-action:hover { background: rgba(0,0,0,.25); color: #fff; }
.chip-action-del:hover { background: rgba(220,38,38,.7); }

/* ──────────────────────────────────────────────
   EMPTY STATE
────────────────────────────────────────────── */
.sched-empty {
  text-align: center;
  padding: 60px 20px;
}
.sched-empty-icon {
  font-size: 3rem;
  color: #cbd5e0;
  margin-bottom: 16px;
}
.sched-empty-title {
  font-weight: 700;
  font-size: 1rem;
  color: #4a5568;
  margin-bottom: 6px;
}
.sched-empty-sub {
  font-size: .85rem;
  color: #a0aec0;
}

/* ──────────────────────────────────────────────
   LEGEND
────────────────────────────────────────────── */
.sched-legend {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 18px;
  font-size: .78rem;
  color: #718096;
  border-top: 1px solid #f0f4f8;
  flex-wrap: wrap;
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  display: inline-block;
}
.legend-orange { background: #FF8C42; }
.legend-teal   { background: #17B1C1; }
.legend-blue   { background: #4E7EFF; }
.legend-today  { background: rgba(255,150,50,.4); border: 1.5px solid rgba(255,150,50,.6); }
</style>

<script>
  function confirmDelete(btn) {
    document.getElementById('deleteForm').action = '/shifts/assign/' + btn.dataset.id + '/delete';
    new bootstrap.Modal(document.getElementById('deleteModal')).show();
  }
</script>
</body>
</html>
