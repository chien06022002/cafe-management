<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!-- ===== HEAD FRAGMENT ===== -->
<th:block th:fragment="head(pageTitle)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${pageTitle} + ' | Café Manager'">Café Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <style>
    :root {
      --sidebar-bg: #1a1a2e;
      --sidebar-hover: #6f4e37;
      --sidebar-active: #8b5e3c;
      --accent: #6f4e37;
      --accent-light: #d4a574;
    }
    body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
    .sidebar {
      width: 260px; min-height: 100vh; background: var(--sidebar-bg);
      position: fixed; top: 0; left: 0; z-index: 1000;
      display: flex; flex-direction: column; transition: all .3s;
    }
    .sidebar-logo {
      padding: 20px 24px; color: #fff; font-size: 1.15rem; font-weight: 700;
      border-bottom: 1px solid rgba(255,255,255,.1); display: flex; align-items: center; gap: 10px;
    }
    .sidebar-logo .logo-icon { font-size: 1.5rem; color: var(--accent-light); }
    .sidebar-section { padding: 10px 0 4px 20px; color: rgba(255,255,255,.4); font-size: .72rem; text-transform: uppercase; letter-spacing: 1px; margin-top: 8px; }
    .sidebar-nav { flex: 1; padding: 8px 0; }
    .sidebar-nav a {
      color: rgba(255,255,255,.75); display: flex; align-items: center; gap: 12px;
      padding: 11px 20px; text-decoration: none; font-size: .92rem; transition: all .2s; border-left: 3px solid transparent;
    }
    .sidebar-nav a:hover { background: rgba(111,78,55,.3); color: #fff; border-left-color: var(--accent-light); }
    .sidebar-nav a.active { background: var(--sidebar-active); color: #fff; border-left-color: var(--accent-light); font-weight: 600; }
    .sidebar-nav a i { width: 18px; text-align: center; opacity: .85; }
    .main-wrapper { margin-left: 260px; min-height: 100vh; display: flex; flex-direction: column; }
    .topbar {
      background: #fff; padding: 0 24px; height: 62px; display: flex; align-items: center;
      justify-content: space-between; box-shadow: 0 1px 4px rgba(0,0,0,.08); position: sticky; top: 0; z-index: 100;
    }
    .topbar-title { font-weight: 600; font-size: 1.05rem; color: #2d3748; }
    .topbar-user { display: flex; align-items: center; gap: 10px; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: .85rem; }
    .main-content { flex: 1; padding: 24px; }
    .card { border: none; box-shadow: 0 1px 8px rgba(0,0,0,.08); border-radius: 12px; }
    .card-header { border-radius: 12px 12px 0 0 !important; background: #fff; border-bottom: 1px solid #f0f0f0; font-weight: 600; }
    .stat-card { border-radius: 12px; padding: 20px; color: #fff; position: relative; overflow: hidden; }
    .stat-card .stat-icon { font-size: 2.5rem; opacity: .25; position: absolute; right: 16px; bottom: 10px; }
    .stat-card .stat-value { font-size: 2rem; font-weight: 700; }
    .stat-card .stat-label { font-size: .82rem; opacity: .85; }
    .bg-coffee { background: linear-gradient(135deg, #6f4e37, #8b5e3c); }
    .bg-teal { background: linear-gradient(135deg, #20b2aa, #17a589); }
    .bg-amber { background: linear-gradient(135deg, #e67e22, #d35400); }
    .bg-slate { background: linear-gradient(135deg, #5c6bc0, #3949ab); }
    .badge-status-active { background: #d4edda; color: #155724; }
    .badge-status-inactive { background: #f8d7da; color: #721c24; }
    .btn-coffee { background: var(--accent); color: #fff; border: none; }
    .btn-coffee:hover { background: var(--sidebar-active); color: #fff; }
    table thead th { background: #fafafa; font-weight: 600; font-size: .86rem; color: #555; white-space: nowrap; }
    .table-hover tbody tr:hover { background: #fdf8f4; }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-260px); }
      .main-wrapper { margin-left: 0; }
    }
  </style>
</th:block>

<!-- ===== SIDEBAR FRAGMENT ===== -->
<th:block th:fragment="sidebar(activePage)">
  <div class="sidebar">
    <div class="sidebar-logo">
      <i class="fas fa-mug-hot logo-icon"></i>
      <span th:text="${currentCafe != null ? currentCafe.name : 'Café Manager'}">Café Manager</span>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section">Tổng Quan</div>
      <a th:href="@{/dashboard}" th:classappend="${activePage == 'dashboard'} ? 'active' : ''">
        <i class="fas fa-tachometer-alt"></i> Dashboard
      </a>

      <div class="sidebar-section">Nhân Sự</div>
      <a th:href="@{/employees}" th:classappend="${activePage == 'employees'} ? 'active' : ''">
        <i class="fas fa-users"></i> Nhân Viên
      </a>
      <a th:href="@{/attendance}" th:classappend="${activePage == 'attendance'} ? 'active' : ''">
        <i class="fas fa-calendar-check"></i> Chấm Công
      </a>
      <a th:if="${currentCafe != null}" th:href="@{/face-checkin/{id}(id=${currentCafe.id})}" target="_blank"
         th:classappend="${activePage == 'face-checkin'} ? 'active' : ''">
        <i class="fas fa-face-smile"></i> Chấm Công Khuôn Mặt
      </a>
      <a th:unless="${currentCafe != null}" th:href="@{/face-checkin}" target="_blank">
        <i class="fas fa-face-smile"></i> Chấm Công Khuôn Mặt
      </a>

      <div class="sidebar-section">Thực Đơn</div>
      <a th:href="@{/menu/categories}" th:classappend="${activePage == 'categories'} ? 'active' : ''">
        <i class="fas fa-tags"></i> Danh Mục
      </a>
      <a th:href="@{/menu/items}" th:classappend="${activePage == 'menu'} ? 'active' : ''">
        <i class="fas fa-utensils"></i> Món Ăn &amp; Đồ Uống
      </a>
      <a th:href="@{/sop}" th:classappend="${activePage == 'sop'} ? 'active' : ''">
        <i class="fas fa-clipboard-list"></i> SOP Chế Biến
      </a>

      <div class="sidebar-section">Ca Làm &amp; Lương</div>
      <a th:href="@{/shifts/manage}" th:classappend="${activePage == 'shifts-manage'} ? 'active' : ''">
        <i class="fas fa-clock"></i> Quản Lý Ca
      </a>
      <a th:href="@{/shifts}" th:classappend="${activePage == 'schedule'} ? 'active' : ''">
        <i class="fas fa-calendar-week"></i> Lịch Phân Ca
      </a>
      <a th:href="@{/payroll}" th:classappend="${activePage == 'payroll'} ? 'active' : ''">
        <i class="fas fa-money-bill-wave"></i> Bảng Lương
      </a>

      <div class="sidebar-section">Cài Đặt</div>
      <a th:href="@{/cafe/settings}" th:classappend="${activePage == 'cafe-settings'} ? 'active' : ''">
        <i class="fas fa-store"></i> Thông Tin Quán
      </a>
    </nav>

    <div style="padding: 16px 20px; border-top: 1px solid rgba(255,255,255,.08);">
      <form th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-sm w-100" style="background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.15);">
          <i class="fas fa-sign-out-alt me-2"></i> Đăng Xuất
        </button>
      </form>
    </div>
  </div>
</th:block>

<!-- ===== TOPBAR FRAGMENT ===== -->
<th:block th:fragment="topbar(pageTitle)">
  <div class="topbar">
    <div class="topbar-title" th:text="${pageTitle}">Trang</div>
    <div class="topbar-user">
      <div class="avatar" sec:authentication="name" th:text="${#strings.toUpperCase(#strings.substring(#authentication.name, 0, 1))}">A</div>
      <div>
        <div style="font-size:.88rem;font-weight:600;" sec:authentication="name">Username</div>
        <div style="font-size:.76rem;color:#888;">
          <span sec:authorize="hasRole('ROLE_ADMIN')">Admin</span>
          <span sec:authorize="hasRole('ROLE_MANAGER')">Quản Lý</span>
          <span sec:authorize="hasRole('ROLE_STAFF')">Nhân Viên</span>
        </div>
      </div>
    </div>
  </div>
</th:block>

<!-- ===== SCRIPTS FRAGMENT ===== -->
<th:block th:fragment="scripts">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</th:block>

</body>
</html>
