<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/layout :: head(${isEdit ? 'Sửa SOP' : 'Thêm SOP'})}"></head>
<body>

<th:block th:replace="~{fragments/layout :: sidebar('sop')}"></th:block>

<div class="main-wrapper">
  <th:block th:replace="~{fragments/layout :: topbar(${isEdit ? 'Cập Nhật Bước SOP' : 'Thêm Bước SOP'})}"></th:block>

  <div class="main-content">
    <div class="row justify-content-center">
      <div class="col-xl-7">

        <!-- Breadcrumb info -->
        <div class="card mb-3" style="background:#fdf8f4;border:1px solid #d4a574;">
          <div class="card-body py-2 px-3 d-flex align-items-center gap-2">
            <i class="fas fa-mug-hot" style="color:#6f4e37;"></i>
            <span class="fw-semibold" th:text="${menuItem.name}">Tên Món</span>
            <span class="text-muted">·</span>
            <span class="text-muted small">
              Bước <strong th:text="${sop.stepOrder}">1</strong>
            </span>
          </div>
        </div>

        <div class="card">
          <div class="card-header py-3">
            <i th:class="${isEdit} ? 'fas fa-edit me-2 text-primary' : 'fas fa-plus me-2 text-success'"></i>
            <span th:text="${isEdit} ? 'Cập Nhật Bước SOP' : 'Thêm Bước SOP Mới'"></span>
          </div>
          <div class="card-body p-4">
            <form th:action="${isEdit} ? @{/sop/{id}/edit(id=${sop.id})} : @{/sop/item/{id}/new(id=${menuItem.id})}"
                  th:object="${sop}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

              <div class="row g-3">
                <div class="col-md-8">
                  <label class="form-label fw-semibold">Tiêu Đề Bước <span class="text-danger">*</span></label>
                  <input type="text" th:field="*{title}" class="form-control"
                         placeholder="VD: Pha cà phê espresso, Thêm đá..." required/>
                </div>
                <div class="col-md-4">
                  <label class="form-label fw-semibold">Thứ Tự Bước <span class="text-danger">*</span></label>
                  <input type="number" th:field="*{stepOrder}" class="form-control" min="1" required/>
                </div>
                <div class="col-12">
                  <label class="form-label fw-semibold">Nội Dung Chi Tiết <span class="text-danger">*</span></label>
                  <textarea th:field="*{content}" class="form-control" rows="8" required
                            placeholder="Mô tả chi tiết các thao tác cần thực hiện trong bước này...&#10;&#10;VD:&#10;1. Rang 20g cà phê ở nhiệt độ 200°C trong 15 phút&#10;2. Xay cà phê ở độ mịn vừa&#10;3. Cho vào portafilter và nén chặt..."></textarea>
                  <div class="form-text">Có thể dùng xuống dòng để liệt kê các bước nhỏ hơn.</div>
                </div>
              </div>

              <hr class="my-4"/>
              <div class="d-flex justify-content-end gap-2">
                <a th:href="@{/sop/item/{id}(id=${menuItem.id})}" class="btn btn-outline-secondary">
                  <i class="fas fa-arrow-left me-1"></i>Quay Lại
                </a>
                <button type="submit" class="btn btn-coffee">
                  <i class="fas fa-save me-1"></i>
                  <span th:text="${isEdit} ? 'Lưu Thay Đổi' : 'Thêm Bước'"></span>
                </button>
              </div>
            </form>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
