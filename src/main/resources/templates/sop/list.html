<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/layout :: head('SOP Chế Biến')}"></head>
<body>

<th:block th:replace="~{fragments/layout :: sidebar('sop')}"></th:block>

<div class="main-wrapper">
  <th:block th:replace="~{fragments/layout :: topbar('SOP Quy Trình Chế Biến')}"></th:block>

  <div class="main-content">
    <div class="card">
      <div class="card-header py-3">
        <i class="fas fa-clipboard-list me-2 text-primary"></i>Chọn Món Ăn Để Xem / Quản Lý SOP
      </div>
      <div class="card-body">
        <div th:if="${menuItems.isEmpty()}" class="text-center py-4 text-muted">
          <i class="fas fa-utensils fa-2x mb-2 d-block"></i>
          Chưa có món ăn nào. <a th:href="@{/menu/items/new}">Thêm món ngay</a>
        </div>
        <div th:unless="${menuItems.isEmpty()}" class="row g-3">
          <div th:each="item : ${menuItems}" class="col-sm-6 col-md-4 col-lg-3">
            <a th:href="@{/sop/item/{id}(id=${item.id})}" class="text-decoration-none">
              <div class="card h-100 border text-center p-3"
                   style="transition:all .2s;cursor:pointer;"
                   onmouseover="this.style.boxShadow='0 4px 16px rgba(111,78,55,.2)';this.style.borderColor='#6f4e37';"
                   onmouseout="this.style.boxShadow='';this.style.borderColor='';">
                <div style="width:52px;height:52px;border-radius:12px;background:#fdf8f4;border:2px solid #d4a574;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;">
                  <i class="fas fa-mug-hot" style="color:#6f4e37;font-size:1.3rem;"></i>
                </div>
                <div class="fw-semibold text-dark mb-1" th:text="${item.name}">-</div>
                <div class="small text-muted" th:text="${item.category != null ? item.category.name : 'Chưa phân loại'}">-</div>
                <div class="mt-2">
                  <span class="badge bg-light text-dark border">
                    <i class="fas fa-list-ol me-1"></i>
                    <span th:text="${item.sops != null ? item.sops.size() : 0}">0</span> bước
                  </span>
                </div>
              </div>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
