<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/layout :: head('Món Ăn & Đồ Uống')}"></head>
<body>

<th:block th:replace="~{fragments/layout :: sidebar('menu')}"></th:block>

<div class="main-wrapper">
  <th:block th:replace="~{fragments/layout :: topbar('Món Ăn & Đồ Uống')}"></th:block>

  <div class="main-content">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
      <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Best Sellers Section -->
    <div th:if="${bestSellers != null and !bestSellers.isEmpty()}" class="card mb-4" style="border-left: 4px solid #f59e0b;">
      <div class="card-header py-3" style="background: linear-gradient(135deg, #fffbeb, #fef3c7);">
        <span class="fw-bold text-warning"><i class="fas fa-star me-2"></i>Món Bán Chạy (Best Seller)</span>
      </div>
      <div class="card-body">
        <div class="row g-3">
          <div th:each="item : ${bestSellers}" class="col-6 col-md-3 col-lg-2">
            <div class="text-center p-2 rounded-3" style="background:#fffbeb; border:1px solid #fcd34d;">
              <img th:if="${item.imageUrl}" th:src="${item.imageUrl}" class="rounded-3 mb-2"
                   style="width:100%;height:80px;object-fit:cover;" alt=""/>
              <div class="fw-semibold small text-truncate" th:text="${item.name}">-</div>
              <div class="text-success small fw-bold"
                   th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">-</div>
              <span class="badge mt-1" style="background:#f59e0b;"><i class="fas fa-star me-1"></i>Best Seller</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header py-3 d-flex justify-content-between align-items-center flex-wrap gap-2">
        <span><i class="fas fa-utensils me-2 text-primary"></i>Danh Sách Món Ăn &amp; Đồ Uống</span>
        <div class="d-flex gap-2 flex-wrap">
          <form th:action="@{/menu/items}" method="get" class="d-flex gap-2 flex-wrap">
            <select name="categoryId" class="form-select form-select-sm" style="min-width:160px;">
              <option value="">-- Tất cả danh mục --</option>
              <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                      th:selected="${selectedCategoryId != null && selectedCategoryId == cat.id}">-</option>
            </select>
            <input type="search" name="keyword" class="form-control form-control-sm"
                   placeholder="Tìm theo tên..." th:value="${keyword}" style="min-width:180px;"/>
            <button type="submit" class="btn btn-sm btn-outline-secondary">
              <i class="fas fa-search"></i>
            </button>
          </form>
          <a th:href="@{/menu/items/new}" class="btn btn-sm btn-coffee">
            <i class="fas fa-plus me-1"></i>Thêm Món
          </a>
        </div>
      </div>

      <div class="card-body p-0">
        <div th:if="${items.isEmpty()}" class="text-center py-5 text-muted">
          <i class="fas fa-utensils fa-3x mb-3 d-block"></i>Không tìm thấy món ăn nào
        </div>
        <div th:unless="${items.isEmpty()}" class="table-responsive">
          <table class="table table-hover mb-0">
            <thead>
              <tr>
                <th class="ps-4">Tên Món</th>
                <th>Danh Mục</th>
                <th>Mô Tả</th>
                <th>Giá (VNĐ)</th>
                <th>Trạng Thái</th>
                <th>SOP</th>
                <th class="text-center">Thao Tác</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="item : ${items}">
                <td class="ps-4 fw-semibold">
                  <span th:text="${item.name}">-</span>
                  <span th:if="${item.bestSeller}" class="badge ms-1" style="background:#f59e0b;font-size:.7rem;">
                    <i class="fas fa-star me-1"></i>Best Seller
                  </span>
                </td>
                <td>
                  <span class="badge bg-secondary rounded-pill"
                        th:text="${item.category != null ? item.category.name : 'Chưa phân loại'}">-</span>
                </td>
                <td class="text-muted" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"
                    th:text="${item.description}">-</td>
                <td class="fw-semibold text-success"
                    th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')}">-</td>
                <td>
                  <span class="badge rounded-pill"
                        th:classappend="${item.available} ? 'bg-success' : 'bg-secondary'"
                        th:text="${item.available} ? 'Đang bán' : 'Ngừng bán'">-</span>
                </td>
                <td>
                  <a th:href="@{/sop/item/{id}(id=${item.id})}" class="btn btn-sm btn-outline-info">
                    <i class="fas fa-clipboard-list"></i>
                    <span class="ms-1" th:text="${item.sops != null ? item.sops.size() : 0}">0</span>
                  </a>
                </td>
                <td class="text-center">
                  <a th:href="@{/menu/items/{id}/edit(id=${item.id})}" class="btn btn-sm btn-outline-primary me-1">
                    <i class="fas fa-edit"></i>
                  </a>
                  <button class="btn btn-sm btn-outline-danger"
                          data-bs-toggle="modal" data-bs-target="#deleteModal"
                          th:attr="data-id=${item.id}, data-name=${item.name}"
                          onclick="setDeleteTarget(this)">
                    <i class="fas fa-trash"></i>
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Delete Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 rounded-4">
      <div class="modal-header border-0">
        <h5 class="modal-title text-danger"><i class="fas fa-trash me-2"></i>Xác Nhận Xóa</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">Xóa món <strong id="deleteItemName"></strong> và toàn bộ SOP liên quan?</div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Hủy</button>
        <form id="deleteForm" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" class="btn btn-danger">Xóa</button>
        </form>
      </div>
    </div>
  </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<script>
  function setDeleteTarget(btn) {
    document.getElementById('deleteItemName').textContent = btn.dataset.name;
    document.getElementById('deleteForm').action = '/menu/items/' + btn.dataset.id + '/delete';
  }
</script>
</body>
</html>
