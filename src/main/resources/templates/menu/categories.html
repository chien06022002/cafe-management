<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/layout :: head('Danh Mục Menu')}"></head>
<body>

<th:block th:replace="~{fragments/layout :: sidebar('categories')}"></th:block>

<div class="main-wrapper">
  <th:block th:replace="~{fragments/layout :: topbar('Quản Lý Danh Mục')}"></th:block>

  <div class="main-content">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
      <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
      <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-3">
      <!-- Form thêm / sửa -->
      <div class="col-lg-4">
        <div class="card">
          <div class="card-header py-3">
            <i class="fas fa-plus-circle me-2 text-success"></i>
            <span th:text="${isEditCategory} ? 'Cập Nhật Danh Mục' : 'Thêm Danh Mục Mới'">Thêm Danh Mục</span>
          </div>
          <div class="card-body">
            <form th:action="${isEditCategory} ? @{/menu/categories/{id}/edit(id=${formCategory.id})} : @{/menu/categories/new}"
                  th:object="${formCategory}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <div class="mb-3">
                <label class="form-label fw-semibold">Tên Danh Mục <span class="text-danger">*</span></label>
                <input type="text" th:field="*{name}" class="form-control"
                       placeholder="VD: Cà Phê, Trà, Bánh..." required/>
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Mô Tả</label>
                <textarea th:field="*{description}" class="form-control" rows="3"
                          placeholder="Mô tả ngắn về danh mục..."></textarea>
              </div>
              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-coffee flex-fill">
                  <i class="fas fa-save me-1"></i>
                  <span th:text="${isEditCategory} ? 'Lưu Thay Đổi' : 'Thêm Danh Mục'"></span>
                </button>
                <a th:if="${isEditCategory}" th:href="@{/menu/categories}" class="btn btn-outline-secondary">
                  <i class="fas fa-times"></i>
                </a>
              </div>
            </form>
          </div>
        </div>
      </div>

      <!-- Danh sách -->
      <div class="col-lg-8">
        <div class="card">
          <div class="card-header py-3">
            <i class="fas fa-tags me-2 text-primary"></i>Danh Sách Danh Mục
            (<span th:text="${categories.size()}">0</span>)
          </div>
          <div class="card-body p-0">
            <div th:if="${categories.isEmpty()}" class="text-center py-5 text-muted">
              <i class="fas fa-folder-open fa-3x mb-3 d-block"></i>Chưa có danh mục nào
            </div>
            <div th:unless="${categories.isEmpty()}" class="table-responsive">
              <table class="table table-hover mb-0">
                <thead>
                  <tr>
                    <th class="ps-4">#</th>
                    <th>Tên Danh Mục</th>
                    <th>Mô Tả</th>
                    <th>Số Món</th>
                    <th class="text-center">Thao Tác</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="cat, stat : ${categories}">
                    <td class="ps-4 text-muted" th:text="${stat.count}">1</td>
                    <td class="fw-semibold" th:text="${cat.name}">-</td>
                    <td class="text-muted" th:text="${cat.description}">-</td>
                    <td>
                      <span class="badge bg-primary rounded-pill"
                            th:text="${cat.menuItems != null ? cat.menuItems.size() : 0}">0</span>
                    </td>
                    <td class="text-center">
                      <a th:href="@{/menu/categories/{id}/edit(id=${cat.id})}" class="btn btn-sm btn-outline-primary me-1">
                        <i class="fas fa-edit"></i>
                      </a>
                      <button class="btn btn-sm btn-outline-danger"
                              data-bs-toggle="modal" data-bs-target="#deleteModal"
                              th:attr="data-id=${cat.id}, data-name=${cat.name}"
                              onclick="setDeleteTarget(this)">
                        <i class="fas fa-trash"></i>
                      </button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Delete Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 rounded-4">
      <div class="modal-header border-0">
        <h5 class="modal-title text-danger"><i class="fas fa-trash me-2"></i>Xác Nhận Xóa</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        Xóa danh mục <strong id="deleteCatName"></strong>? Tất cả món ăn trong danh mục này cũng sẽ bị xóa.
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Hủy</button>
        <form id="deleteForm" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" class="btn btn-danger">Xóa</button>
        </form>
      </div>
    </div>
  </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<script>
  function setDeleteTarget(btn) {
    document.getElementById('deleteCatName').textContent = btn.dataset.name;
    document.getElementById('deleteForm').action = '/menu/categories/' + btn.dataset.id + '/delete';
  }
</script>
</body>
</html>
