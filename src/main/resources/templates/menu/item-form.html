<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/layout :: head(${isEdit ? 'Sửa Món' : 'Thêm Món'})}"></head>
<body>

<th:block th:replace="~{fragments/layout :: sidebar('menu')}"></th:block>

<div class="main-wrapper">
  <th:block th:replace="~{fragments/layout :: topbar(${isEdit ? 'Cập Nhật Món Ăn' : 'Thêm Món Ăn Mới'})}"></th:block>

  <div class="main-content">
    <div class="row justify-content-center">
      <div class="col-xl-7">
        <div class="card">
          <div class="card-header py-3">
            <i class="fas fa-utensils me-2 text-primary"></i>
            <span th:text="${isEdit} ? 'Cập Nhật Thông Tin Món' : 'Thêm Món Mới'"></span>
          </div>
          <div class="card-body p-4">
            <form th:action="${isEdit} ? @{/menu/items/{id}/edit(id=${item.id})} : @{/menu/items/new}"
                  th:object="${item}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

              <div class="row g-3">
                <div class="col-12">
                  <label class="form-label fw-semibold">Tên Món <span class="text-danger">*</span></label>
                  <input type="text" th:field="*{name}" class="form-control"
                         placeholder="VD: Cà Phê Sữa Đá" required/>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Danh Mục</label>
                  <select name="categoryId" class="form-select">
                    <option value="">-- Chọn danh mục --</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"
                            th:selected="${item.category != null && item.category.id == cat.id}">-</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Giá Bán (VNĐ) <span class="text-danger">*</span></label>
                  <input type="number" th:field="*{price}" class="form-control"
                         placeholder="VD: 35000" min="0" step="1000" required/>
                </div>
                <div class="col-12">
                  <label class="form-label fw-semibold">Mô Tả</label>
                  <textarea th:field="*{description}" class="form-control" rows="3"
                            placeholder="Mô tả về món ăn, đồ uống..."></textarea>
                </div>
                <div class="col-12">
                  <label class="form-label fw-semibold">Link Hình Ảnh</label>
                  <input type="url" th:field="*{imageUrl}" class="form-control"
                         placeholder="https://..."/>
                </div>
                <div class="col-12">
                  <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" th:field="*{available}" role="switch"/>
                    <label class="form-check-label fw-semibold" th:for="available">Đang bán</label>
                  </div>
                </div>
                <div class="col-12">
                  <div class="form-check form-switch">
                    <input class="form-check-input" type="checkbox" th:field="*{bestSeller}" role="switch" style="accent-color:#f59e0b;"/>
                    <label class="form-check-label fw-semibold" th:for="bestSeller">
                      <i class="fas fa-star text-warning me-1"></i>Best Seller (Món Bán Chạy)
                    </label>
                  </div>
                </div>
              </div>

              <hr class="my-4"/>
              <div class="d-flex justify-content-end gap-2">
                <a th:href="@{/menu/items}" class="btn btn-outline-secondary">
                  <i class="fas fa-arrow-left me-1"></i>Quay Lại
                </a>
                <button type="submit" class="btn btn-coffee">
                  <i class="fas fa-save me-1"></i>
                  <span th:text="${isEdit} ? 'Lưu Thay Đổi' : 'Thêm Món'"></span>
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
