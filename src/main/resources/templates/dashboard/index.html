<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="vi">
<head th:replace="~{fragments/layout :: head('Dashboard')}"></head>
<body>

<th:block th:replace="~{fragments/layout :: sidebar('dashboard')}"></th:block>

<div class="main-wrapper">
  <th:block th:replace="~{fragments/layout :: topbar('Dashboard')}"></th:block>

  <div class="main-content">

    <!-- Stat Cards -->
    <div class="row g-3 mb-4">
      <div class="col-sm-6 col-xl-3">
        <div class="stat-card bg-coffee">
          <div class="stat-label">Tổng Nhân Viên</div>
          <div class="stat-value" th:text="${totalEmployees}">0</div>
          <div style="font-size:.8rem;opacity:.75;">Đang hoạt động: <span th:text="${activeEmployees}">0</span></div>
          <i class="fas fa-users stat-icon"></i>
        </div>
      </div>
      <div class="col-sm-6 col-xl-3">
        <div class="stat-card bg-teal">
          <div class="stat-label">Có Mặt Hôm Nay</div>
          <div class="stat-value" th:text="${presentToday}">0</div>
          <div style="font-size:.8rem;opacity:.75;">Vắng: <span th:text="${absentToday}">0</span></div>
          <i class="fas fa-calendar-check stat-icon"></i>
        </div>
      </div>
      <div class="col-sm-6 col-xl-3">
        <div class="stat-card bg-amber">
          <div class="stat-label">Tổng Món Ăn</div>
          <div class="stat-value" th:text="${totalMenuItems}">0</div>
          <div style="font-size:.8rem;opacity:.75;">Đang bán: <span th:text="${availableItems}">0</span></div>
          <i class="fas fa-utensils stat-icon"></i>
        </div>
      </div>
      <div class="col-sm-6 col-xl-3">
        <div class="stat-card bg-slate">
          <div class="stat-label">Ngày Hôm Nay</div>
          <div class="stat-value" style="font-size:1.4rem;" th:text="${#temporals.format(today,'dd/MM')}">-</div>
          <div style="font-size:.8rem;opacity:.75;" th:text="${#temporals.format(today,'EEEE',#locale)}">-</div>
          <i class="fas fa-calendar stat-icon"></i>
        </div>
      </div>
    </div>

    <!-- Quick Actions & Attendance -->
    <div class="row g-3">
      <div class="col-lg-4">
        <div class="card h-100">
          <div class="card-header py-3">
            <i class="fas fa-bolt me-2 text-warning"></i>Thao Tác Nhanh
          </div>
          <div class="card-body d-grid gap-2">
            <a th:href="@{/employees/new}" class="btn btn-coffee">
              <i class="fas fa-user-plus me-2"></i>Thêm Nhân Viên
            </a>
            <a th:href="@{/attendance/new}" class="btn btn-outline-secondary">
              <i class="fas fa-clock me-2"></i>Chấm Công Hôm Nay
            </a>
            <a th:href="@{/menu/items/new}" class="btn btn-outline-secondary">
              <i class="fas fa-plus me-2"></i>Thêm Món Mới
            </a>
            <a th:href="@{/sop}" class="btn btn-outline-secondary">
              <i class="fas fa-clipboard-list me-2"></i>Xem SOP
            </a>
          </div>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="card h-100">
          <div class="card-header py-3 d-flex justify-content-between align-items-center">
            <span><i class="fas fa-calendar-day me-2 text-primary"></i>Chấm Công Hôm Nay</span>
            <a th:href="@{/attendance}" class="btn btn-sm btn-outline-secondary">Xem tất cả</a>
          </div>
          <div class="card-body p-0">
            <div th:if="${todayAttendance.isEmpty()}" class="text-center py-5 text-muted">
              <i class="fas fa-calendar-times fa-2x mb-2 d-block"></i>
              Chưa có dữ liệu chấm công hôm nay
            </div>
            <div th:unless="${todayAttendance.isEmpty()}" class="table-responsive">
              <table class="table table-hover mb-0">
                <thead>
                  <tr>
                    <th class="ps-3">Nhân Viên</th>
                    <th>Vào</th>
                    <th>Ra</th>
                    <th>Trạng Thái</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="att : ${todayAttendance}">
                    <td class="ps-3 fw-medium" th:text="${att.employee.fullName}">-</td>
                    <td th:text="${att.checkIn != null ? #temporals.format(att.checkIn,'HH:mm') : '-'}">-</td>
                    <td th:text="${att.checkOut != null ? #temporals.format(att.checkOut,'HH:mm') : '-'}">-</td>
                    <td>
                      <span class="badge rounded-pill"
                            th:classappend="${att.status == 'PRESENT'} ? 'bg-success' : (${att.status == 'ABSENT'} ? 'bg-danger' : (${att.status == 'LATE'} ? 'bg-warning text-dark' : 'bg-info'))"
                            th:text="${att.status == 'PRESENT'} ? 'Có mặt' : (${att.status == 'ABSENT'} ? 'Vắng' : (${att.status == 'LATE'} ? 'Muộn' : (${att.status == 'LEAVE'} ? 'Nghỉ phép' : 'Nửa ngày')))">
                      </span>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
