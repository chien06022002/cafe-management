<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chọn Quán - Kiosk Chấm Công</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        body { background: #1a1a2e; color: #eee; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .cafe-card { background: #16213e; border: 1px solid #0f3460; border-radius: 16px; padding: 2rem; transition: transform 0.2s, border-color 0.2s; cursor: pointer; text-decoration: none; color: inherit; display: block; }
        .cafe-card:hover { transform: translateY(-4px); border-color: #4fc3f7; color: #4fc3f7; }
    </style>
</head>
<body>
<div class="container" style="max-width: 700px;">
    <div class="text-center mb-5">
        <i class="fas fa-coffee fa-3x text-warning mb-3"></i>
        <h2 class="fw-bold">Chọn Quán Chấm Công</h2>
        <p class="text-muted">Vui lòng chọn quán cà phê bạn đang làm việc</p>
    </div>
    <div class="row g-4">
        <div class="col-md-6" th:each="cafe : ${cafes}">
            <a th:href="@{/face-checkin/{id}(id=${cafe.id})}" class="cafe-card">
                <div class="text-center">
                    <i class="fas fa-store fa-2x mb-3 text-info"></i>
                    <h4 th:text="${cafe.name}">Tên quán</h4>
                    <p class="text-muted small mb-0" th:text="${cafe.address}">Địa chỉ</p>
                </div>
            </a>
        </div>
    </div>
</div>
</body>
</html>
