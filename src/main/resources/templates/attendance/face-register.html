<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/layout :: head('Đăng Ký Khuôn Mặt')}"></head>
<body>

<th:block th:replace="~{fragments/layout :: sidebar('employees')}"></th:block>

<div class="main-wrapper">
  <th:block th:replace="~{fragments/layout :: topbar('Đăng Ký Khuôn Mặt')}"></th:block>

  <!-- CSRF tokens for fetch -->
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

  <div class="main-content">
    <div class="row justify-content-center">
      <div class="col-lg-8">

        <!-- Employee info card -->
        <div class="card mb-3">
          <div class="card-body d-flex align-items-center gap-3 py-3">
            <div class="avatar" style="width:52px;height:52px;font-size:1.2rem;"
                 th:text="${#strings.substring(employee.fullName,0,1)}">?</div>
            <div>
              <div class="fw-bold fs-5" th:text="${employee.fullName}">-</div>
              <div class="text-muted small">
                <span th:text="${employee.employeeCode}">-</span> ·
                <span th:text="${employee.position}">-</span> ·
                <span th:text="${employee.department}">-</span>
              </div>
            </div>
            <div class="ms-auto">
              <span th:if="${hasFace}" class="badge bg-success rounded-pill">
                <i class="fas fa-check me-1"></i>Đã đăng ký khuôn mặt
              </span>
              <span th:unless="${hasFace}" class="badge bg-warning text-dark rounded-pill">
                <i class="fas fa-exclamation me-1"></i>Chưa đăng ký
              </span>
            </div>
          </div>
        </div>

        <div class="row g-3">
          <!-- Camera panel -->
          <div class="col-md-7">
            <div class="card">
              <div class="card-header py-3">
                <i class="fas fa-camera me-2 text-primary"></i>Camera
                <span id="modelStatus" class="badge bg-secondary ms-2 float-end" style="font-size:.72rem;">
                  Đang tải model...
                </span>
              </div>
              <div class="card-body p-0 position-relative" style="background:#111;border-radius:0 0 12px 12px;">
                <video id="videoEl" autoplay muted playsinline
                       style="width:100%;border-radius:0 0 12px 12px;display:block;max-height:380px;object-fit:cover;">
                </video>
                <canvas id="overlayCanvas"
                        style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;">
                </canvas>
                <!-- Status overlay -->
                <div id="faceStatus"
                     style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.55);
                            color:#fff;text-align:center;padding:10px;font-size:.9rem;">
                  Đang khởi động camera...
                </div>
              </div>
            </div>
          </div>

          <!-- Control panel -->
          <div class="col-md-5">
            <div class="card h-100">
              <div class="card-header py-3">
                <i class="fas fa-id-badge me-2 text-success"></i>Đăng Ký Khuôn Mặt
              </div>
              <div class="card-body d-flex flex-column gap-3">

                <div class="alert alert-info py-2 small mb-0">
                  <i class="fas fa-info-circle me-1"></i>
                  Hướng mặt thẳng vào camera, đảm bảo ánh sáng đủ tốt.
                  Nhấn <strong>Chụp &amp; Đăng Ký</strong> khi khung xanh xuất hiện.
                </div>

                <div id="previewBox" class="text-center" style="display:none;">
                  <canvas id="snapshotCanvas"
                          style="border-radius:12px;max-width:100%;border:3px solid #6f4e37;"></canvas>
                  <div class="mt-2 text-muted small" id="descriptorInfo">-</div>
                </div>

                <div id="resultBox" style="display:none;">
                  <div class="alert mb-0 py-2 small" id="resultAlert"></div>
                </div>

                <div class="mt-auto d-flex flex-column gap-2">
                  <button id="captureBtn" class="btn btn-coffee" disabled>
                    <i class="fas fa-camera me-2"></i>Chụp &amp; Đăng Ký
                  </button>
                  <button id="recaptureBtn" class="btn btn-outline-secondary" style="display:none;">
                    <i class="fas fa-redo me-2"></i>Chụp Lại
                  </button>
                  <th:block th:if="${hasFace}">
                    <hr class="my-1"/>
                    <form th:action="@{/employees/{id}/face-delete(id=${employee.id})}" method="post">
                      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                      <button type="submit" class="btn btn-outline-danger btn-sm w-100"
                              onclick="return confirm('Xóa dữ liệu khuôn mặt của nhân viên này?')">
                        <i class="fas fa-trash me-1"></i>Xóa Dữ Liệu Khuôn Mặt
                      </button>
                    </form>
                  </th:block>
                  <a th:href="@{/employees/{id}(id=${employee.id})}" class="btn btn-outline-secondary btn-sm">
                    <i class="fas fa-arrow-left me-1"></i>Quay Lại
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<!-- face-api.js -->
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script th:inline="javascript">
  const EMPLOYEE_ID = /*[[${employee.id}]]*/ 0;
  const MODEL_URL = '/weights';
  const CSRF_TOKEN = document.querySelector('meta[name="_csrf"]').content;
  const CSRF_HEADER = document.querySelector('meta[name="_csrf_header"]').content;

  const video = document.getElementById('videoEl');
  const overlay = document.getElementById('overlayCanvas');
  const faceStatus = document.getElementById('faceStatus');
  const captureBtn = document.getElementById('captureBtn');
  const recaptureBtn = document.getElementById('recaptureBtn');
  const previewBox = document.getElementById('previewBox');
  const snapshotCanvas = document.getElementById('snapshotCanvas');
  const descriptorInfo = document.getElementById('descriptorInfo');
  const resultBox = document.getElementById('resultBox');
  const resultAlert = document.getElementById('resultAlert');
  const modelStatus = document.getElementById('modelStatus');

  let currentDescriptor = null;
  let detecting = false;
  let detectionInterval = null;

  async function loadModels() {
    try {
      modelStatus.textContent = 'Đang tải model AI...';
      modelStatus.className = 'badge bg-warning text-dark ms-2 float-end';
      await Promise.all([
        faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
        faceapi.nets.faceLandmark68TinyNet.loadFromUri(MODEL_URL),
        faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
      ]);
      modelStatus.textContent = 'Model sẵn sàng ✓';
      modelStatus.className = 'badge bg-success ms-2 float-end';
      await startCamera();
    } catch (err) {
      modelStatus.textContent = 'Lỗi tải model';
      modelStatus.className = 'badge bg-danger ms-2 float-end';
      faceStatus.textContent = '⚠ Không thể tải model AI: ' + err.message;
    }
  }

  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
      video.srcObject = stream;
      video.addEventListener('loadedmetadata', () => {
        overlay.width = video.videoWidth;
        overlay.height = video.videoHeight;
        startDetection();
      });
    } catch (err) {
      faceStatus.textContent = '⚠ Không thể truy cập camera: ' + err.message;
    }
  }

  const detectorOptions = new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.5 });

  function startDetection() {
    detectionInterval = setInterval(async () => {
      if (detecting || video.paused || video.ended) return;
      detecting = true;
      try {
        const result = await faceapi
          .detectSingleFace(video, detectorOptions)
          .withFaceLandmarks(true)
          .withFaceDescriptor();

        const ctx = overlay.getContext('2d');
        ctx.clearRect(0, 0, overlay.width, overlay.height);

        if (result) {
          // Vẽ khung
          const scaleX = overlay.width / video.videoWidth;
          const scaleY = overlay.height / video.videoHeight;
          const { x, y, width, height } = result.detection.box;
          ctx.strokeStyle = '#00c853';
          ctx.lineWidth = 3;
          ctx.strokeRect(x * scaleX, y * scaleY, width * scaleX, height * scaleY);

          currentDescriptor = result.descriptor;
          faceStatus.textContent = '✅ Phát hiện khuôn mặt – Nhấn "Chụp & Đăng Ký"';
          faceStatus.style.background = 'rgba(0,200,83,.6)';
          captureBtn.disabled = false;
        } else {
          currentDescriptor = null;
          faceStatus.textContent = '👤 Không phát hiện khuôn mặt – Hướng mặt vào camera';
          faceStatus.style.background = 'rgba(0,0,0,.55)';
          captureBtn.disabled = true;
        }
      } catch (_) {}
      detecting = false;
    }, 300);
  }

  captureBtn.addEventListener('click', async () => {
    if (!currentDescriptor) return;

    clearInterval(detectionInterval);
    captureBtn.style.display = 'none';

    // Chụp snapshot
    snapshotCanvas.width = video.videoWidth;
    snapshotCanvas.height = video.videoHeight;
    snapshotCanvas.getContext('2d').drawImage(video, 0, 0);
    previewBox.style.display = 'block';
    descriptorInfo.textContent = 'Descriptor: 128 chiều – Độ dài: ' + currentDescriptor.length;

    // Gửi lên server
    try {
      const resp = await fetch(`/employees/${EMPLOYEE_ID}/face-register`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          [CSRF_HEADER]: CSRF_TOKEN
        },
        body: JSON.stringify({ descriptor: Array.from(currentDescriptor) })
      });
      const data = await resp.json();
      resultBox.style.display = 'block';
      if (data.success) {
        resultAlert.className = 'alert alert-success mb-0 py-2 small';
        resultAlert.innerHTML = '<i class="fas fa-check-circle me-1"></i>' + data.message;
        recaptureBtn.style.display = 'block';
      } else {
        resultAlert.className = 'alert alert-danger mb-0 py-2 small';
        resultAlert.innerHTML = '<i class="fas fa-times-circle me-1"></i>' + data.message;
        recaptureBtn.style.display = 'block';
      }
    } catch (err) {
      resultBox.style.display = 'block';
      resultAlert.className = 'alert alert-danger mb-0 py-2 small';
      resultAlert.textContent = 'Lỗi kết nối: ' + err.message;
      recaptureBtn.style.display = 'block';
    }
  });

  recaptureBtn.addEventListener('click', () => {
    previewBox.style.display = 'none';
    resultBox.style.display = 'none';
    captureBtn.style.display = 'block';
    captureBtn.disabled = true;
    recaptureBtn.style.display = 'none';
    currentDescriptor = null;
    startDetection();
  });

  loadModels();
</script>
</body>
</html>
