<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/layout :: head('Thông Tin Quán')}"></head>
<body>

<th:block th:replace="~{fragments/layout :: sidebar('cafe-settings')}"></th:block>

<div class="main-wrapper">
  <th:block th:replace="~{fragments/layout :: topbar('Thông Tin Quán Cà Phê')}"></th:block>

  <div class="main-content">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
      <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
      <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card mb-4">
          <div class="card-header py-3">
            <i class="fas fa-store me-2 text-primary"></i>Chỉnh Sửa Thông Tin Quán
          </div>
          <div class="card-body p-4">
            <form th:action="@{/cafe/settings}" th:object="${cafe}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <input type="hidden" th:field="*{id}"/>

              <div class="mb-3">
                <label class="form-label fw-semibold">Tên Quán <span class="text-danger">*</span></label>
                <input type="text" class="form-control" th:field="*{name}"
                       placeholder="Ví dụ: Café Sài Gòn" required/>
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Địa Chỉ</label>
                <input type="text" class="form-control" th:field="*{address}"
                       placeholder="Địa chỉ quán"/>
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Số Điện Thoại</label>
                <input type="text" class="form-control" th:field="*{phone}"
                       placeholder="028-xxxx-xxxx"/>
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Mô Tả</label>
                <textarea class="form-control" th:field="*{description}" rows="3"
                          placeholder="Giới thiệu ngắn về quán..."></textarea>
              </div>

              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-coffee">
                  <i class="fas fa-save me-1"></i>Lưu Thông Tin
                </button>
                <a th:href="@{/dashboard}" class="btn btn-outline-secondary">
                  <i class="fas fa-times me-1"></i>Hủy
                </a>
              </div>
            </form>
          </div>
        </div>

        <!-- Kiosk URL info card -->
        <div class="card" th:if="${cafe != null && cafe.id != null}">
          <div class="card-header py-3">
            <i class="fas fa-qrcode me-2 text-info"></i>Kiosk Chấm Công Khuôn Mặt
          </div>
          <div class="card-body">
            <p class="text-muted mb-2">Chia sẻ link này với nhân viên để chấm công bằng khuôn mặt:</p>
            <div class="input-group">
              <input type="text" class="form-control bg-light" readonly id="kioskUrl"
                     th:value="@{/face-checkin/{id}(id=${cafe.id})}"/>
              <button class="btn btn-outline-secondary" type="button" onclick="copyKioskUrl()">
                <i class="fas fa-copy me-1"></i>Sao Chép
              </button>
              <a class="btn btn-outline-success" th:href="@{/face-checkin/{id}(id=${cafe.id})}" target="_blank">
                <i class="fas fa-external-link-alt me-1"></i>Mở Kiosk
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<script>
  function copyKioskUrl() {
    const input = document.getElementById('kioskUrl');
    const fullUrl = window.location.origin + input.value;
    navigator.clipboard.writeText(fullUrl).then(() => {
      alert('Đã sao chép URL kiosk!');
    }).catch(() => {
      input.select();
      document.execCommand('copy');
      alert('Đã sao chép URL kiosk!');
    });
  }
</script>
</body>
</html>
