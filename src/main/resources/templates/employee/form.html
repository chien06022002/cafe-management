<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/layout :: head(${isEdit ? 'Sửa Nhân Viên' : 'Thêm Nhân Viên'})}"></head>
<body>

<th:block th:replace="~{fragments/layout :: sidebar('employees')}"></th:block>

<div class="main-wrapper">
  <th:block th:replace="~{fragments/layout :: topbar(${isEdit ? 'Cập Nhật Nhân Viên' : 'Thêm Nhân Viên Mới'})}"></th:block>

  <div class="main-content">
    <div class="row justify-content-center">
      <div class="col-xl-8">
        <div class="card">
          <div class="card-header py-3">
            <i th:class="${isEdit} ? 'fas fa-user-edit me-2 text-primary' : 'fas fa-user-plus me-2 text-success'"></i>
            <span th:text="${isEdit} ? 'Cập Nhật Thông Tin Nhân Viên' : 'Thêm Nhân Viên Mới'"></span>
          </div>
          <div class="card-body p-4">
            <form th:action="${isEdit} ? @{/employees/{id}/edit(id=${employee.id})} : @{/employees/new}"
                  th:object="${employee}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Mã Nhân Viên <span class="text-danger">*</span></label>
                  <input type="text" th:field="*{employeeCode}" class="form-control"
                         th:readonly="${isEdit}" placeholder="VD: NV0001" required/>
                  <div class="text-danger small mt-1" th:if="${#fields.hasErrors('employeeCode')}"
                       th:errors="*{employeeCode}"></div>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Họ Và Tên <span class="text-danger">*</span></label>
                  <input type="text" th:field="*{fullName}" class="form-control" placeholder="Họ và tên đầy đủ" required/>
                  <div class="text-danger small mt-1" th:if="${#fields.hasErrors('fullName')}"
                       th:errors="*{fullName}"></div>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Số Điện Thoại</label>
                  <input type="tel" th:field="*{phone}" class="form-control" placeholder="0900 000 000"/>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Email</label>
                  <input type="email" th:field="*{email}" class="form-control" placeholder="email@cafe.vn"/>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Chức Vụ</label>
                  <select th:field="*{position}" class="form-select">
                    <option value="">-- Chọn chức vụ --</option>
                    <option value="Quản lý">Quản lý</option>
                    <option value="Barista">Barista</option>
                    <option value="Phục vụ">Phục vụ</option>
                    <option value="Thu ngân">Thu ngân</option>
                    <option value="Bếp">Bếp</option>
                    <option value="Vệ sinh">Vệ sinh</option>
                    <option value="Bảo vệ">Bảo vệ</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Bộ Phận</label>
                  <select th:field="*{department}" class="form-select">
                    <option value="">-- Chọn bộ phận --</option>
                    <option value="Ban Giám Đốc">Ban Giám Đốc</option>
                    <option value="Pha Chế">Pha Chế</option>
                    <option value="Phục Vụ">Phục Vụ</option>
                    <option value="Bếp">Bếp</option>
                    <option value="Kế Toán">Kế Toán</option>
                    <option value="Bảo Vệ">Bảo Vệ</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Ngày Vào Làm</label>
                  <input type="date" th:field="*{hireDate}" class="form-control"/>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Lương Cơ Bản (VNĐ)</label>
                  <input type="number" th:field="*{salary}" class="form-control" placeholder="VD: 8000000" min="0" step="500000"/>
                </div>
                <div class="col-12">
                  <label class="form-label fw-semibold">Địa Chỉ</label>
                  <input type="text" th:field="*{address}" class="form-control" placeholder="Địa chỉ thường trú"/>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Trạng Thái</label>
                  <select th:field="*{status}" class="form-select">
                    <option value="ACTIVE">Đang làm việc</option>
                    <option value="INACTIVE">Đã nghỉ việc</option>
                  </select>
                </div>
              </div>

              <hr class="my-4"/>
              <div class="d-flex justify-content-end gap-2">
                <a th:href="@{/employees}" class="btn btn-outline-secondary">
                  <i class="fas fa-arrow-left me-1"></i>Quay Lại
                </a>
                <button type="submit" class="btn btn-coffee">
                  <i th:class="${isEdit} ? 'fas fa-save me-1' : 'fas fa-user-plus me-1'"></i>
                  <span th:text="${isEdit} ? 'Lưu Thay Đổi' : 'Thêm Nhân Viên'"></span>
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
