<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/layout :: head('Chi Tiết Nhân Viên')}"></head>
<body>

<th:block th:replace="~{fragments/layout :: sidebar('employees')}"></th:block>

<div class="main-wrapper">
  <th:block th:replace="~{fragments/layout :: topbar('Chi Tiết Nhân Viên')}"></th:block>

  <div class="main-content">
    <div class="row g-3">
      <div class="col-lg-4">
        <div class="card text-center p-4">
          <div class="mx-auto mb-3" style="width:80px;height:80px;border-radius:50%;background:#6f4e37;display:flex;align-items:center;justify-content:center;font-size:2rem;color:#fff;font-weight:700;"
               th:text="${#strings.toUpperCase(#strings.substring(employee.fullName,0,1))}">A</div>
          <h5 class="mb-1 fw-bold" th:text="${employee.fullName}">-</h5>
          <p class="text-muted mb-2" th:text="${employee.position}">-</p>
          <span class="badge rounded-pill px-3 py-2 fs-6"
                th:classappend="${employee.status == 'ACTIVE'} ? 'badge-status-active' : 'badge-status-inactive'"
                th:text="${employee.status == 'ACTIVE'} ? 'Đang làm việc' : 'Đã nghỉ việc'">-</span>
          <hr/>
          <div class="d-grid gap-2">
            <a th:href="@{/employees/{id}/edit(id=${employee.id})}" class="btn btn-coffee">
              <i class="fas fa-edit me-2"></i>Chỉnh Sửa
            </a>
            <a th:href="@{/employees/{id}/face-register(id=${employee.id})}" class="btn btn-outline-primary">
              <i class="fas fa-face-smile me-2"></i>
              <span th:text="${employee.faceDescriptor != null} ? 'Cập Nhật Khuôn Mặt' : 'Đăng Ký Khuôn Mặt'">Khuôn Mặt</span>
            </a>
            <a th:href="@{/employees}" class="btn btn-outline-secondary">
              <i class="fas fa-arrow-left me-2"></i>Quay Lại
            </a>
          </div>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="card mb-3">
          <div class="card-header py-3">
            <i class="fas fa-id-card me-2 text-primary"></i>Thông Tin Cá Nhân
          </div>
          <div class="card-body">
            <div class="row g-3">
              <div class="col-sm-6">
                <small class="text-muted d-block">Mã Nhân Viên</small>
                <strong th:text="${employee.employeeCode}">-</strong>
              </div>
              <div class="col-sm-6">
                <small class="text-muted d-block">Email</small>
                <strong th:text="${employee.email ?: '-'}">-</strong>
              </div>
              <div class="col-sm-6">
                <small class="text-muted d-block">Số Điện Thoại</small>
                <strong th:text="${employee.phone ?: '-'}">-</strong>
              </div>
              <div class="col-sm-6">
                <small class="text-muted d-block">Bộ Phận</small>
                <strong th:text="${employee.department ?: '-'}">-</strong>
              </div>
              <div class="col-sm-6">
                <small class="text-muted d-block">Ngày Vào Làm</small>
                <strong th:text="${employee.hireDate != null ? #temporals.format(employee.hireDate,'dd/MM/yyyy') : '-'}">-</strong>
              </div>
              <div class="col-sm-6">
                <small class="text-muted d-block">Lương Cơ Bản</small>
                <strong th:text="${employee.salary != null ? #numbers.formatDecimal(employee.salary,0,'COMMA',0,'POINT') + ' VNĐ' : '-'}">-</strong>
              </div>
              <div class="col-12">
                <small class="text-muted d-block">Địa Chỉ</small>
                <strong th:text="${employee.address ?: '-'}">-</strong>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header py-3">
            <i class="fas fa-calendar-check me-2 text-success"></i>Lịch Sử Chấm Công Gần Đây
          </div>
          <div class="card-body p-0">
            <div th:if="${employee.attendances == null || employee.attendances.isEmpty()}" class="text-center py-4 text-muted">
              Chưa có dữ liệu chấm công
            </div>
            <div th:unless="${employee.attendances == null || employee.attendances.isEmpty()}" class="table-responsive">
              <table class="table table-sm mb-0">
                <thead>
                  <tr>
                    <th class="ps-3">Ngày</th>
                    <th>Vào</th>
                    <th>Ra</th>
                    <th>Trạng Thái</th>
                    <th>Ghi Chú</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="att, stat : ${employee.attendances}" th:if="${stat.index < 10}">
                    <td class="ps-3" th:text="${#temporals.format(att.date,'dd/MM/yyyy')}">-</td>
                    <td th:text="${att.checkIn != null ? #temporals.format(att.checkIn,'HH:mm') : '-'}">-</td>
                    <td th:text="${att.checkOut != null ? #temporals.format(att.checkOut,'HH:mm') : '-'}">-</td>
                    <td>
                      <span class="badge rounded-pill"
                            th:classappend="${att.status == 'PRESENT'} ? 'bg-success' : (${att.status == 'ABSENT'} ? 'bg-danger' : 'bg-warning text-dark')"
                            th:text="${att.status == 'PRESENT'} ? 'Có mặt' : (${att.status == 'ABSENT'} ? 'Vắng' : att.status)">-</span>
                    </td>
                    <td th:text="${att.note ?: ''}">-</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
