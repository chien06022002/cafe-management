<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/layout :: head('Nhân Viên')}"></head>
<body>

<th:block th:replace="~{fragments/layout :: sidebar('employees')}"></th:block>

<div class="main-wrapper">
  <th:block th:replace="~{fragments/layout :: topbar('Quản Lý Nhân Viên')}"></th:block>

  <div class="main-content">

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
      <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
      <i class="fas fa-exclamation-circle me-2"></i><span th:text="${error}"></span>
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card">
      <div class="card-header py-3 d-flex justify-content-between align-items-center flex-wrap gap-2">
        <span><i class="fas fa-users me-2 text-primary"></i>Danh Sách Nhân Viên</span>
        <div class="d-flex gap-2">
          <form th:action="@{/employees}" method="get" class="d-flex gap-2">
            <input type="search" name="keyword" class="form-control form-control-sm"
                   placeholder="Tìm theo tên, mã NV..." th:value="${keyword}" style="min-width:220px;"/>
            <button type="submit" class="btn btn-sm btn-outline-secondary">
              <i class="fas fa-search"></i>
            </button>
            <a th:href="@{/employees}" class="btn btn-sm btn-outline-secondary" th:if="${keyword}">
              <i class="fas fa-times"></i>
            </a>
          </form>
          <a th:href="@{/employees/new}" class="btn btn-sm btn-coffee">
            <i class="fas fa-user-plus me-1"></i>Thêm Mới
          </a>
        </div>
      </div>
      <div class="card-body p-0">
        <div th:if="${employees.isEmpty()}" class="text-center py-5 text-muted">
          <i class="fas fa-user-slash fa-3x mb-3 d-block"></i>
          Không tìm thấy nhân viên nào
        </div>
        <div th:unless="${employees.isEmpty()}" class="table-responsive">
          <table class="table table-hover mb-0">
            <thead>
              <tr>
                <th class="ps-4">Mã NV</th>
                <th>Họ Tên</th>
                <th>Số Điện Thoại</th>
                <th>Chức Vụ</th>
                <th>Bộ Phận</th>
                <th>Ngày Vào</th>
                <th>Lương (VNĐ)</th>
                <th>Trạng Thái</th>
                <th class="text-center">Thao Tác</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="emp : ${employees}">
                <td class="ps-4 fw-medium text-primary" th:text="${emp.employeeCode}">-</td>
                <td>
                  <a th:href="@{/employees/{id}(id=${emp.id})}" class="text-decoration-none fw-medium text-dark"
                     th:text="${emp.fullName}">-</a>
                </td>
                <td th:text="${emp.phone}">-</td>
                <td th:text="${emp.position}">-</td>
                <td th:text="${emp.department}">-</td>
                <td th:text="${emp.hireDate != null ? #temporals.format(emp.hireDate,'dd/MM/yyyy') : '-'}">-</td>
                <td th:text="${emp.salary != null ? #numbers.formatDecimal(emp.salary, 0, 'COMMA', 0, 'POINT') : '-'}">-</td>
                <td>
                  <span class="badge rounded-pill px-3 py-1"
                        th:classappend="${emp.status == 'ACTIVE'} ? 'badge-status-active' : 'badge-status-inactive'"
                        th:text="${emp.status == 'ACTIVE'} ? 'Đang làm' : 'Nghỉ việc'">-</span>
                </td>
                <td class="text-center">
                  <a th:href="@{/employees/{id}/edit(id=${emp.id})}" class="btn btn-sm btn-outline-primary me-1">
                    <i class="fas fa-edit"></i>
                  </a>
                  <button class="btn btn-sm btn-outline-danger"
                          data-bs-toggle="modal" data-bs-target="#deleteModal"
                          th:attr="data-id=${emp.id}, data-name=${emp.fullName}"
                          onclick="setDeleteTarget(this)">
                    <i class="fas fa-trash"></i>
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Delete Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 rounded-4">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title text-danger"><i class="fas fa-trash me-2"></i>Xác Nhận Xóa</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        Bạn có chắc muốn xóa nhân viên <strong id="deleteEmployeeName"></strong>?
        <div class="alert alert-warning mt-3 mb-0 py-2" style="font-size:.85rem;">
          <i class="fas fa-exclamation-triangle me-1"></i>Hành động này không thể hoàn tác.
        </div>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Hủy</button>
        <form id="deleteForm" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" class="btn btn-danger">Xác Nhận Xóa</button>
        </form>
      </div>
    </div>
  </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
<script>
  function setDeleteTarget(btn) {
    document.getElementById('deleteEmployeeName').textContent = btn.dataset.name;
    document.getElementById('deleteForm').action = '/employees/' + btn.dataset.id + '/delete';
  }
</script>
</body>
</html>
