<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lỗi Máy Chủ | Café Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <style>
    body { background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .error-box { text-align: center; padding: 40px 30px; }
    .error-code { font-size: 6rem; font-weight: 800; color: #dc3545; line-height: 1; }
    .error-icon { font-size: 3rem; color: #c0392b; margin-bottom: 16px; }
  </style>
</head>
<body>
<div class="error-box">
  <div class="error-icon"><i class="fas fa-exclamation-triangle"></i></div>
  <div class="error-code">500</div>
  <h3 class="mt-3 mb-2 fw-bold">Lỗi Máy Chủ</h3>
  <p class="text-muted mb-4">Đã xảy ra lỗi trong quá trình xử lý. Vui lòng thử lại sau.</p>
  <a href="/dashboard" class="btn btn-lg" style="background:#6f4e37;color:#fff;border:none;">
    <i class="fas fa-home me-2"></i>Về Trang Chủ
  </a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
